<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chloe's Job Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .ai-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
        
        /* 狀態標籤樣式 */
        .status-pill { padding: 6px 14px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; border: none; cursor: pointer; transition: all 0.2s; outline: none; appearance: none; text-align: center; }
        .status-applied { background: #dcfce7; color: #166534; }
        .status-interview { background: #fef9c3; color: #854d0e; }
        .status-rejected { background: #fee2e2; color: #991b1b; }
        .status-offer { background: #e0f2fe; color: #0369a1; }
        .status-pending { background: #f1f5f9; color: #64748b; }
        
        .job-card { transition: transform 0.2s ease, box-shadow 0.2s ease; border: 1px solid transparent; }
        .job-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); border-color: #e2e8f0; }
    </style>
</head>
<body class="min-h-screen pb-20">
    <div class="max-w-2xl mx-auto px-6 py-12">
        <!-- 標題區域 -->
        <div class="flex justify-between items-end mb-10">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight text-slate-900">Career <span class="ai-gradient text-transparent bg-clip-text">Hub</span></h1>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] mt-2">Chloe's Personal Tracker</p>
            </div>
            <button onclick="addNewJob()" class="ai-gradient text-white px-6 py-3 rounded-2xl text-sm font-bold shadow-lg shadow-indigo-200 hover:scale-105 active:scale-95 transition-all">
                ＋ 新增職位
            </button>
        </div>

        <!-- 數據統計板 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="glass p-5 rounded-[2rem] text-center shadow-sm">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">總申請數</p>
                <div class="text-2xl font-black mt-1" id="stat-total">0</div>
            </div>
            <div class="glass p-5 rounded-[2rem] text-center shadow-sm">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">面試邀約</p>
                <div class="text-2xl font-black text-amber-500 mt-1" id="stat-interview">0</div>
            </div>
            <div class="glass p-5 rounded-[2rem] text-center shadow-sm">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">當前勝率</p>
                <div class="text-2xl font-black text-indigo-600 mt-1" id="stat-rate">0%</div>
            </div>
            <div class="glass p-5 rounded-[2rem] text-center shadow-sm">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">收到 Offers</p>
                <div class="text-2xl font-black text-green-600 mt-1" id="stat-offers">0</div>
            </div>
        </div>

        <!-- 職缺列表 -->
        <div id="job-list" class="space-y-4">
            <!-- 載入中的骨架動畫 -->
            <div class="animate-pulse space-y-4">
                <div class="h-20 bg-slate-100 rounded-[1.5rem]"></div>
                <div class="h-20 bg-slate-100 rounded-[1.5rem]"></div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAOJJfeH_3WSlCl3Ncyt8RRzttu8cY77Sg",
            authDomain: "job-searching-tracker.firebaseapp.com",
            projectId: "job-searching-tracker",
            storageBucket: "job-searching-tracker.firebasestorage.app",
            messagingSenderId: "41615562183",
            appId: "1:41615562183:web:654666dd152ed7455775e2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 匿名登入
        signInAnonymously(auth).catch(err => console.error("登入失敗", err));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // 監聽數據 (按建立時間倒序排列)
                const q = query(collection(db, 'jobs'), orderBy('createdAt', 'desc'));
                onSnapshot(q, (snapshot) => {
                    const jobs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    renderJobs(jobs);
                    updateStats(jobs);
                }, (error) => {
                    console.error("資料讀取失敗:", error);
                });
            }
        });

        // 渲染列表
        function renderJobs(jobs) {
            const list = document.getElementById('job-list');
            if (jobs.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-20 bg-white/40 rounded-[2.5rem] border-2 border-dashed border-slate-200">
                        <p class="text-slate-400 text-sm font-medium">還沒有任何紀錄，點擊「新增職位」開始吧！</p>
                    </div>`;
                return;
            }
            list.innerHTML = jobs.map(job => `
                <div class="job-card bg-white p-6 rounded-[2rem] shadow-sm flex justify-between items-center group">
                    <div class="min-w-0 flex-1">
                        <h3 class="font-extrabold text-slate-800 text-lg truncate pr-4">${job.title}</h3>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="text-[10px] font-black text-indigo-500 uppercase tracking-widest">${job.company}</span>
                            <span class="text-slate-300 text-[10px]">•</span>
                            <span class="text-slate-400 text-[10px] font-bold">${formatDate(job.createdAt)}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-3">
                        <select onchange="updateStatus('${job.id}', this.value)" class="status-pill ${getStatusClass(job.status)}">
                            <option value="未投遞" ${job.status==='未投遞'?'selected':''}>未投遞</option>
                            <option value="已投遞" ${job.status==='已投遞'?'selected':''}>已投遞</option>
                            <option value="面試中" ${job.status==='面試中'?'selected':''}>面試中</option>
                            <option value="拒信" ${job.status==='拒信'?'selected':''}>拒信</option>
                            <option value="錄取" ${job.status==='錄取'?'selected':''}>錄取</option>
                        </select>
                        <button onclick="delJob('${job.id}')" class="opacity-0 group-hover:opacity-100 p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-full transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // 輔助函式
        function getStatusClass(s) {
            const map = { '已投遞': 'status-applied', '面試中': 'status-interview', '拒信': 'status-rejected', '錄取': 'status-offer' };
            return map[s] || 'status-pending';
        }

        function updateStats(jobs) {
            const interviews = jobs.filter(j => j.status === '面試中').length;
            const offers = jobs.filter(j => j.status === '錄取').length;
            document.getElementById('stat-total').innerText = jobs.length;
            document.getElementById('stat-interview').innerText = interviews;
            document.getElementById('stat-offers').innerText = offers;
            const rate = jobs.length ? Math.round((offers / jobs.length) * 100) : 0;
            document.getElementById('stat-rate').innerText = rate + "%";
        }

        function formatDate(ts) {
            if (!ts) return '剛剛';
            try {
                const date = ts.toDate();
                return `${date.getMonth()+1}/${date.getDate()}`;
            } catch(e) { return '處理中'; }
        }

        // 視窗全域函式
        window.addNewJob = async () => {
            const title = prompt("職位名稱 (例如: UI Designer):");
            const company = prompt("公司名稱 (例如: Apple):");
            if (title && company) {
                await addDoc(collection(db, 'jobs'), {
                    title, company, status: '未投遞', createdAt: serverTimestamp()
                });
            }
        };

        window.updateStatus = async (id, status) => {
            await updateDoc(doc(db, 'jobs', id), { status });
        };

        window.delJob = async (id) => {
            if (confirm("確定要刪除這筆紀錄嗎？")) {
                await deleteDoc(doc(db, 'jobs', id));
            }
        };
    </script>
</body>
</html>
