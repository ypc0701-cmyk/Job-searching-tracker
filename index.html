<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chloe's Career Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .ai-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .status-pill { padding: 4px 12px; border-radius: 10px; font-size: 0.75rem; font-weight: 700; border: none; cursor: pointer; }
        .status-applied { background: #dcfce7; color: #166534; }
        .status-interview { background: #fef9c3; color: #854d0e; }
        .status-rejected { background: #fee2e2; color: #991b1b; }
        .status-offer { background: #e0f2fe; color: #0369a1; }
        .status-pending { background: #f1f5f9; color: #64748b; }
        .job-card { transition: all 0.2s ease; border: 1px solid transparent; }
        .job-card:hover { transform: translateY(-2px); box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1); border-color: #e2e8f0; }
        .log-box { background: #fffbeb; border: 1px solid #fef3c7; color: #92400e; font-family: monospace; font-size: 12px; line-height: 1.6; }
    </style>
</head>
<body class="min-h-screen pb-20">
    <div class="max-w-5xl mx-auto px-6 py-12">
        <!-- 標題 -->
        <div class="flex justify-between items-start mb-10">
            <div>
                <h1 class="text-5xl font-extrabold tracking-tight text-slate-900">Career <span class="ai-gradient text-transparent bg-clip-text">Hub</span></h1>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-[0.2em] mt-3">Chloe's Strategic Job Tracker</p>
            </div>
            <button onclick="openModal()" class="ai-gradient text-white px-8 py-4 rounded-2xl text-sm font-bold shadow-xl shadow-indigo-200 hover:scale-105 active:scale-95 transition-all">
                ＋ 新增職位
            </button>
        </div>

        <!-- 數據統計板 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-10">
            <div class="glass p-6 rounded-[2.5rem] text-center shadow-sm">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">總申請</p>
                <div class="text-3xl font-black mt-1" id="stat-total">0</div>
            </div>
            <div class="glass p-6 rounded-[2.5rem] text-center shadow-sm">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">面試</p>
                <div class="text-3xl font-black text-amber-500 mt-1" id="stat-interview">0</div>
            </div>
            <div class="glass p-6 rounded-[2.5rem] text-center shadow-sm">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">勝率</p>
                <div class="text-3xl font-black text-indigo-600 mt-1" id="stat-rate">0%</div>
            </div>
            <div class="glass p-6 rounded-[2.5rem] text-center shadow-sm">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">OFFERS</p>
                <div class="text-3xl font-black text-green-600 mt-1" id="stat-offers">0</div>
            </div>
        </div>

        <!-- 系統日誌 (偵錯用) -->
        <div id="system-log" class="log-box p-6 rounded-[2rem] mb-10 hidden">
            <p class="font-bold border-b border-amber-200 mb-2 pb-1">系統日誌：</p>
            <div id="log-content"></div>
        </div>

        <!-- 職缺列表 -->
        <div id="job-list" class="space-y-4">
            <div class="flex flex-col items-center justify-center py-20 text-slate-400">
                <div class="w-10 h-10 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
                <p id="loading-text">正在與資料庫建立連線...</p>
            </div>
        </div>
    </div>

    <!-- 彈窗 (新增/編輯) -->
    <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-[3rem] p-10 w-full max-w-xl shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-8">
                <h2 id="modal-title" class="text-3xl font-bold text-slate-800">新增職位</h2>
                <button onclick="closeModal()" class="text-slate-300 hover:text-slate-500 text-2xl">✕</button>
            </div>
            
            <div class="space-y-5">
                <input type="hidden" id="in-id">
                <div>
                    <label class="text-[10px] font-black text-slate-400 ml-1 uppercase">職缺名稱</label>
                    <input id="in-title" type="text" class="w-full px-5 py-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 mt-1" placeholder="例如: Frontend Intern">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 ml-1 uppercase">公司</label>
                    <input id="in-company" type="text" class="w-full px-5 py-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 mt-1" placeholder="例如: Google">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 ml-1 uppercase">類型</label>
                        <select id="in-type" class="w-full px-5 py-4 bg-slate-50 rounded-2xl outline-none mt-1">
                            <option value="Intern">Intern</option>
                            <option value="Full-time">Full-time</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 ml-1 uppercase">狀態</label>
                        <select id="in-status" class="w-full px-5 py-4 bg-slate-50 rounded-2xl outline-none mt-1">
                            <option value="未投遞">未投遞</option>
                            <option value="已投遞">已投遞</option>
                            <option value="面試中">面試中</option>
                            <option value="錄取">錄取</option>
                            <option value="拒信">拒信</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="flex gap-4 mt-10">
                <button onclick="closeModal()" class="flex-1 py-4 font-bold text-slate-400">取消</button>
                <button onclick="submitJob()" id="btn-submit" class="flex-1 ai-gradient text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-200">儲存職位</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'job-searching-tracker';

        function addLog(msg) {
            const logBox = document.getElementById('system-log');
            const logContent = document.getElementById('log-content');
            logBox.classList.remove('hidden');
            logContent.innerHTML += `> ${msg}<br>`;
        }

        const initAuth = async () => {
            addLog("正在初始化 Firebase...");
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    addLog("嘗試匿名登入...");
                    await signInAnonymously(auth);
                }
            } catch (err) {
                addLog(`登入失敗: ${err.message}`);
            }
        };

        initAuth();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                addLog(`登入成功，UID: ${user.uid}`);
                const colRef = collection(db, 'artifacts', appId, 'users', user.uid, 'jobs');
                addLog("開始監聽資料庫 'jobs' 集合...");
                
                // 為了避免索引錯誤，先不使用 orderBy
                onSnapshot(colRef, (snapshot) => {
                    const jobs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    addLog(`收到數據更新，共 ${jobs.length} 筆資料`);
                    renderJobs(jobs);
                    updateStats(jobs);
                }, (err) => {
                    addLog(`Firestore 錯誤: ${err.message}`);
                    document.getElementById('loading-text').innerText = "連線失敗，請檢查存取權限。";
                });
            }
        });

        function renderJobs(jobs) {
            const list = document.getElementById('job-list');
            if (jobs.length === 0) {
                list.innerHTML = `<div class="text-center py-20 text-slate-400">點擊「新增職位」開始追蹤吧！</div>`;
                return;
            }
            list.innerHTML = jobs.map(job => `
                <div class="job-card bg-white p-6 rounded-[2.5rem] shadow-sm flex items-center justify-between group">
                    <div>
                        <div class="flex items-center gap-3">
                            <h3 class="font-bold text-xl text-slate-800">${job.title}</h3>
                            <span class="text-[10px] font-black px-3 py-1 bg-indigo-50 text-indigo-500 rounded-lg uppercase tracking-widest">${job.type}</span>
                        </div>
                        <p class="text-slate-400 font-bold text-sm mt-1 uppercase tracking-wider">${job.company}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="status-pill ${getStatusClass(job.status)}">${job.status}</div>
                        <button onclick="delJob('${job.id}')" class="p-3 text-slate-200 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round"></path></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        window.openModal = () => {
            document.getElementById('in-id').value = "";
            document.getElementById('modal').classList.replace('hidden', 'flex');
        };

        window.closeModal = () => document.getElementById('modal').classList.replace('flex', 'hidden');

        window.submitJob = async () => {
            const user = auth.currentUser;
            if (!user) return;
            const data = {
                title: document.getElementById('in-title').value,
                company: document.getElementById('in-company').value,
                type: document.getElementById('in-type').value,
                status: document.getElementById('in-status').value,
                createdAt: serverTimestamp()
            };
            if (!data.title || !data.company) return;
            
            await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'jobs'), data);
            closeModal();
        };

        window.delJob = async (id) => {
            if (confirm("確定刪除嗎？")) {
                const user = auth.currentUser;
                await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'jobs', id));
            }
        };

        function getStatusClass(s) {
            const map = { '已投遞': 'status-applied', '面試中': 'status-interview', '拒信': 'status-rejected', '錄取': 'status-offer' };
            return map[s] || 'status-pending';
        }

        function updateStats(jobs) {
            const interviews = jobs.filter(j => j.status === '面試中').length;
            const offers = jobs.filter(j => j.status === '錄取').length;
            document.getElementById('stat-total').innerText = jobs.length;
            document.getElementById('stat-interview').innerText = interviews;
            document.getElementById('stat-offers').innerText = offers;
            document.getElementById('stat-rate').innerText = jobs.length ? Math.round((offers / jobs.length) * 100) + "%" : "0%";
        }
    </script>
</body>
</html>
