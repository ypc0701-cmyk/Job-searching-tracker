<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Hub | Chloe's Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfdfe; color: #1e293b; }
        .ai-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(241, 245, 249, 1); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #6366f1; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen pb-20">
    <div class="max-w-6xl mx-auto px-6 py-12">
        <!-- 頂部欄位 -->
        <div class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight text-slate-900">Career <span class="text-indigo-600">Hub</span></h1>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] mt-2">Chloe's Strategic Job Tracker</p>
            </div>
            <div class="flex gap-3">
                <div id="conn-status" class="flex items-center gap-2 px-3 py-1 bg-slate-100 rounded-full text-[10px] font-bold text-slate-400">
                    <span class="w-2 h-2 rounded-full bg-slate-300 animate-pulse"></span> 偵測連線中
                </div>
                <button onclick="toggleAIPanel()" class="bg-white border border-slate-200 text-slate-600 px-6 py-3 rounded-2xl text-sm font-bold hover:bg-slate-50 transition-all flex items-center gap-2">✨ AI 分析 JD</button>
                <button onclick="openModal()" class="ai-gradient text-white px-8 py-3 rounded-2xl text-sm font-bold shadow-lg shadow-indigo-200 hover:opacity-90 transition-all">＋ 新增職位</button>
            </div>
        </div>

        <!-- AI 分析面板 -->
        <div id="ai-panel" class="hidden mb-12 glass p-8 rounded-[2.5rem] shadow-sm border-2 border-indigo-50">
            <h2 class="text-xl font-bold mb-4 text-slate-800">🤖 Gemini 智慧分析</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <textarea id="jd-input" rows="8" class="w-full p-4 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-indigo-500 bg-slate-50/50 text-sm" placeholder="請貼上職缺描述 (Job Description)..."></textarea>
                    <button onclick="analyzeJD()" id="analyze-btn" class="w-full mt-3 bg-slate-900 text-white py-3 rounded-xl font-bold text-sm hover:bg-slate-800 transition-colors">開始 AI 深度分析</button>
                </div>
                <div id="ai-result" class="bg-white p-6 rounded-2xl border border-dashed border-slate-200 min-h-[200px] overflow-y-auto">
                    <div class="flex flex-col items-center justify-center h-full text-slate-400 py-10">
                        <p class="text-sm italic">分析結果將顯示在此處...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 統計數據 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12">
            <div class="glass p-8 rounded-[2rem] text-center shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">已投遞 / 總數</p>
                <div class="text-4xl font-black" id="stat-ratio">0 / 0</div>
            </div>
            <div class="glass p-8 rounded-[2rem] text-center shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">面試邀請</p>
                <div class="text-4xl font-black text-amber-500" id="stat-interview">0</div>
            </div>
            <div class="glass p-8 rounded-[2rem] text-center shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">面試勝率</p>
                <div class="text-4xl font-black text-indigo-600" id="stat-winrate">0%</div>
            </div>
            <div class="glass p-8 rounded-[2rem] text-center shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Offers</p>
                <div class="text-4xl font-black text-green-600" id="stat-offers">0</div>
            </div>
        </div>

        <!-- 職位列表 -->
        <div id="job-list" class="grid grid-cols-1 gap-4">
            <div class="flex flex-col items-center justify-center py-20 text-slate-400">
                <div class="loader mb-4"></div>
                <p class="text-sm">連線至資料庫中...</p>
            </div>
        </div>
    </div>

    <!-- 表單 Modal -->
    <div id="modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-2xl shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modal-title" class="text-2xl font-extrabold text-slate-800">職位資訊</h2>
                <button onclick="closeModal()" class="text-slate-300 hover:text-slate-500 text-xl">✕</button>
            </div>

            <div class="mb-6 p-4 bg-indigo-50/50 rounded-2xl border border-indigo-100">
                <label class="text-[10px] font-bold text-indigo-400 uppercase">自動填充 (貼上 AI 列點資訊)</label>
                <textarea id="auto-scan-input" rows="2" oninput="autoScan()" class="w-full bg-transparent outline-none text-sm mt-2" placeholder="格式範例：職稱: 產品經理 公司: Google"></textarea>
            </div>

            <div class="space-y-5">
                <input type="hidden" id="in-id">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">職缺名稱</label>
                        <input id="in-title" type="text" class="w-full px-4 py-3 bg-slate-50 rounded-xl mt-1 text-sm outline-none border border-transparent focus:border-indigo-200">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">公司名稱</label>
                        <input id="in-company" type="text" class="w-full px-4 py-3 bg-slate-50 rounded-xl mt-1 text-sm outline-none border border-transparent focus:border-indigo-200">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">類別</label>
                        <select id="in-category" class="w-full px-4 py-3 bg-slate-50 rounded-xl mt-1 text-sm outline-none">
                            <option value="Intern">Intern</option>
                            <option value="Full-time">Full-time</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">工作型態</label>
                        <select id="in-mode" class="w-full px-4 py-3 bg-slate-50 rounded-xl mt-1 text-sm outline-none">
                            <option value="On-site">On-site</option>
                            <option value="Remote">Remote</option>
                            <option value="Hybrid">Hybrid</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">狀態</label>
                        <select id="in-status" class="w-full px-4 py-3 bg-slate-50 rounded-xl mt-1 text-sm outline-none">
                            <option value="未投遞">未投遞</option>
                            <option value="已投遞">已投遞</option>
                            <option value="收到面試邀請">收到面試邀請</option>
                            <option value="錄取">錄取</option>
                            <option value="拒信">拒信</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">薪資</label>
                        <input id="in-salary" type="text" class="w-full px-4 py-3 bg-slate-50 rounded-xl mt-1 text-sm outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">AI 分數</label>
                        <input id="in-score" type="number" step="0.1" class="w-full px-4 py-3 bg-slate-50 rounded-xl mt-1 text-sm outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">職缺連結</label>
                        <input id="in-job-url" type="url" class="w-full px-4 py-3 bg-slate-50 rounded-xl mt-1 text-sm outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Network 連結</label>
                        <input id="in-network-url" type="url" class="w-full px-4 py-3 bg-slate-50 rounded-xl mt-1 text-sm outline-none">
                    </div>
                </div>
            </div>

            <div class="flex gap-4 mt-10">
                <button id="btn-delete" onclick="deleteJob()" class="hidden flex-none px-6 py-4 font-bold text-red-400 text-sm hover:text-red-600 transition-colors">刪除</button>
                <button onclick="saveJob()" class="flex-1 ai-gradient text-white py-4 rounded-2xl font-bold shadow-lg text-sm hover:opacity-90 transition-all">儲存職位</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // ==========================================
        // 配置區：使用環境提供的自動配置
        // ==========================================
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSy...", // 備用手動 Key (通常不需要)
            projectId: "chloe-career-tracker"
        };
        
        const GEMINI_API_KEY = "AIzaSyAATf9owgUmHRyNcDbV3QRC0uA4VzNBNOI";
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'chloe-career-v4';
        const authToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
        // ==========================================

        let user, db, auth, allJobs = [];

        async function initApp() {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                // 優先使用系統 Token 驗證，否則使用匿名登入
                if (authToken) {
                    await signInWithCustomToken(auth, authToken);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (u) => {
                    user = u;
                    const statusEl = document.getElementById('conn-status');
                    if (user) {
                        statusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-green-500"></span> 已連線 (UID: ${user.uid.substring(0,6)}...)`;
                        statusEl.classList.replace('text-slate-400', 'text-green-600');
                        startListening();
                    } else {
                        statusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-500"></span> 驗證中...`;
                    }
                });
            } catch (error) {
                console.error("Firebase 初始化錯誤:", error);
                document.getElementById('conn-status').innerHTML = `<span class="w-2 h-2 rounded-full bg-red-500"></span> 網路攔截 (請檢查環境)`;
                document.getElementById('job-list').innerHTML = `<div class="text-center py-20 text-red-400 text-sm">連線受阻，可能是因為預覽環境限制。<br>錯誤代碼：${error.code}</div>`;
            }
        }

        function startListening() {
            if (!user) return;
            // 嚴格遵守路徑規則：/artifacts/{appId}/public/data/{collection}
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'jobs');
            
            onSnapshot(colRef, (snap) => {
                allJobs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            }, (err) => {
                console.error("Firestore 監聽失敗 (請確認路徑):", err);
            });
        }

        // --- AI 分析邏輯 ---
        window.analyzeJD = async () => {
            const jd = document.getElementById('jd-input').value;
            if (!jd) return alert("請貼上 JD。");
            
            const btn = document.getElementById('analyze-btn');
            const resultArea = document.getElementById('ai-result');
            
            btn.disabled = true; 
            btn.innerText = "Gemini 分析中...";
            resultArea.innerHTML = `<div class="flex flex-col items-center justify-center h-full"><div class="loader mb-2"></div><p class="text-[10px] text-indigo-500 font-bold uppercase tracking-widest">分析適配度...</p></div>`;

            const prompt = `你是頂級求職顧問。根據 JD: "${jd}"，並參考 Chloe 背景 (MSBA @ BU, Garmin Intern, Ecommerce Startup)。
            回傳 JSON：{"score":數字, "title":"職稱", "company":"公司", "category":"Intern/Full-time", "mode":"Remote/On-site/Hybrid", "salary":"薪資", "reason":"50字原因", "bulletPoints":"清單格式描述"}。
            僅回傳 JSON 代碼，勿加文字。`;

            try {
                // 使用支援的 Gemini 模型
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!res.ok) throw new Error("API 請求無效");
                const data = await res.json();
                const ai = JSON.parse(data.candidates[0].content.parts[0].text);

                resultArea.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex justify-between items-end">
                            <h3 class="font-bold text-slate-800">${ai.company}</h3>
                            <span class="text-3xl font-black text-indigo-600">${ai.score}</span>
                        </div>
                        <p class="text-xs font-bold text-slate-500">${ai.title} • ${ai.category}</p>
                        <p class="text-[11px] leading-relaxed text-slate-600">${ai.reason}</p>
                        <div class="bg-slate-50 p-3 rounded-xl text-[10px] font-mono text-slate-400 whitespace-pre-wrap">${ai.bulletPoints}</div>
                        <button onclick='fillAI(${JSON.stringify(ai).replace(/'/g, "&apos;")})' class="w-full py-3 ai-gradient text-white rounded-xl text-xs font-bold shadow-md">快速填充表單</button>
                    </div>
                `;
            } catch (e) {
                console.error(e);
                resultArea.innerHTML = `<p class="text-xs text-red-400 text-center mt-20">AI 服務暫時無法使用。</p>`;
            } finally {
                btn.disabled = false; btn.innerText = "開始 AI 深度分析";
            }
        };

        window.fillAI = (ai) => {
            openModal();
            document.getElementById('in-title').value = ai.title || "";
            document.getElementById('in-company').value = ai.company || "";
            document.getElementById('in-category').value = ai.category || "Intern";
            document.getElementById('in-mode').value = ai.mode || "On-site";
            document.getElementById('in-salary').value = ai.salary || "";
            document.getElementById('in-score').value = ai.score || 0;
        };

        window.autoScan = () => {
            const val = document.getElementById('auto-scan-input').value;
            const patterns = { title: /職稱[:：]\s*(.*)/i, company: /公司[:：]\s*(.*)/i, salary: /薪資[:：]\s*(.*)/i, score: /分數[:：]\s*(.*)/i };
            for (let k in patterns) {
                const m = val.match(patterns[k]);
                if (m) document.getElementById('in-' + k).value = m[1].trim();
            }
        };

        function render() {
            const list = document.getElementById('job-list');
            if (allJobs.length === 0) {
                list.innerHTML = `<div class="text-center py-20 text-slate-300 text-sm">尚無職位記錄</div>`;
                return;
            }
            allJobs.sort((a, b) => (b.updatedAt?.seconds || 0) - (a.updatedAt?.seconds || 0));
            list.innerHTML = allJobs.map(j => `
                <div onclick="openEdit('${j.id}')" class="bg-white p-6 rounded-[2rem] flex justify-between items-center cursor-pointer shadow-sm hover:shadow-md transition-all border border-transparent hover:border-indigo-100">
                    <div>
                        <h3 class="font-bold text-slate-800">${j.title} <span class="text-[9px] bg-slate-100 px-2 py-0.5 rounded ml-1 text-slate-400">${j.category}</span></h3>
                        <p class="text-[11px] text-slate-400 mt-1">${j.company} • ${j.mode}</p>
                    </div>
                    <div class="text-right">
                        <div class="text-xs font-black text-indigo-600 mb-1">${j.score || 0} PTS</div>
                        <div class="px-3 py-1 ${getStatusStyle(j.status)} rounded-full text-[9px] font-bold">${j.status}</div>
                    </div>
                </div>
            `).join('');
            updateStats();
        }

        function getStatusStyle(s) {
            if (s === '錄取') return 'bg-green-50 text-green-600';
            if (s === '收到面試邀請') return 'bg-amber-50 text-amber-600';
            if (s === '拒信') return 'bg-red-50 text-red-600';
            if (s === '已投遞') return 'bg-blue-50 text-blue-600';
            return 'bg-slate-50 text-slate-400';
        }

        function updateStats() {
            const applied = allJobs.filter(j => j.status !== '未投遞').length;
            const interview = allJobs.filter(j => j.status === '收到面試邀請').length;
            const offer = allJobs.filter(j => j.status === '錄取').length;
            document.getElementById('stat-ratio').innerText = `${applied} / ${allJobs.length}`;
            document.getElementById('stat-interview').innerText = interview;
            document.getElementById('stat-offers').innerText = offer;
            document.getElementById('stat-winrate').innerText = applied ? Math.round((offer/applied)*100)+'%' : '0%';
        }

        window.saveJob = async () => {
            if (!user) return alert("資料庫未連線");
            const id = document.getElementById('in-id').value;
            const data = {
                title: document.getElementById('in-title').value,
                company: document.getElementById('in-company').value,
                category: document.getElementById('in-category').value,
                mode: document.getElementById('in-mode').value,
                status: document.getElementById('in-status').value,
                salary: document.getElementById('in-salary').value,
                score: parseFloat(document.getElementById('in-score').value) || 0,
                jobUrl: document.getElementById('in-job-url').value,
                networkUrl: document.getElementById('in-network-url').value,
                updatedAt: serverTimestamp()
            };
            
            const colPath = `artifacts/${appId}/public/data/jobs`;
            try {
                if (id) {
                    await updateDoc(doc(db, colPath, id), data);
                } else {
                    await addDoc(collection(db, colPath), data);
                }
                closeModal();
            } catch (e) {
                console.error("儲存失敗:", e);
                alert("儲存失敗，請檢查權限。");
            }
        };

        window.deleteJob = async () => {
            if (confirm("確定刪除此職位？")) {
                const id = document.getElementById('in-id').value;
                await deleteDoc(doc(db, `artifacts/${appId}/public/data/jobs`, id));
                closeModal();
            }
        };

        window.openModal = () => {
            document.getElementById('modal-title').innerText = "新增職位";
            document.getElementById('in-id').value = "";
            document.querySelectorAll('#modal input').forEach(i => i.value = "");
            document.getElementById('btn-delete').classList.add('hidden');
            document.getElementById('modal').classList.replace('hidden', 'flex');
        };

        window.openEdit = (id) => {
            const j = allJobs.find(x => x.id === id);
            document.getElementById('modal-title').innerText = "編輯職位";
            document.getElementById('in-id').value = id;
            document.getElementById('in-title').value = j.title;
            document.getElementById('in-company').value = j.company;
            document.getElementById('in-category').value = j.category;
            document.getElementById('in-mode').value = j.mode;
            document.getElementById('in-status').value = j.status;
            document.getElementById('in-salary').value = j.salary;
            document.getElementById('in-score').value = j.score;
            document.getElementById('in-job-url').value = j.jobUrl || "";
            document.getElementById('in-network-url').value = j.networkUrl || "";
            document.getElementById('btn-delete').classList.remove('hidden');
            document.getElementById('modal').classList.replace('hidden', 'flex');
        };

        window.closeModal = () => document.getElementById('modal').classList.replace('flex', 'hidden');
        window.toggleAIPanel = () => document.getElementById('ai-panel').classList.toggle('hidden');

        // 啟動程式
        initApp();
    </script>
</body>
</html>
