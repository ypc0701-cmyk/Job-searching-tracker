<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chloe's Career Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(230, 232, 240, 0.8); }
        .card-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04); }
        .status-pill { padding: 6px 14px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: all 0.2s; border: none; outline: none; }
        .status-applied { background-color: #dcfce7; color: #166534; }
        .status-not-applied { background-color: #f1f5f9; color: #475569; }
        .status-interview { background-color: #fef9c3; color: #854d0e; }
        .status-rejected { background-color: #fee2e2; color: #991b1b; }
        .status-offer { background-color: #e0f2fe; color: #0369a1; }
        .ai-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
    </style>
</head>
<body class="pb-20">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- 使用你提供的 Firebase 配置 ---
        const firebaseConfig = {
            apiKey: "AIzaSyAOJJfeH_3WSlCl3Ncyt8RRzttu8cY77Sg",
            authDomain: "job-searching-tracker.firebaseapp.com",
            projectId: "job-searching-tracker",
            storageBucket: "job-searching-tracker.firebasestorage.app",
            messagingSenderId: "41615562183",
            appId: "1:41615562183:web:654666dd152ed7455775e2"
        };

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 全域變數以便後續操作
        window.db = db;
        window.appId = 'job-searching-tracker-prod';

        // 匿名登入
        signInAnonymously(auth).catch((error) => {
            console.error("驗證錯誤:", error);
            document.getElementById('loading-text').innerText = "驗證失敗，請檢查 Firebase 設定。";
        });

        // 監聽登入狀態並開始同步
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("已登入:", user.uid);
                startSync();
            }
        });

        function startSync() {
            // 使用公共路徑以便存取
            const collRef = collection(db, 'artifacts', window.appId, 'public', 'data', 'jobs');
            
            onSnapshot(collRef, (snapshot) => {
                let jobs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                // 依時間排序
                jobs.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                renderJobs(jobs);
                updateStats(jobs);
            }, (err) => {
                console.error("Firestore 錯誤:", err);
                document.getElementById('loading-text').innerText = "連線失敗，請確保 Firestore 已開啟測試模式。";
            });
        }
    </script>

    <div class="max-w-4xl mx-auto px-6 pt-10">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Career <span class="ai-gradient text-transparent bg-clip-text">Hub</span></h1>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1">Chloe's Job Search Tracker</p>
            </div>
            <button onclick="addNewJob()" class="ai-gradient text-white px-6 py-2.5 rounded-2xl text-sm font-bold shadow-lg hover:opacity-90 active:scale-95 transition-all">
                ＋ 新增職缺
            </button>
        </header>

        <!-- 數據面板 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass p-5 rounded-[2rem] card-shadow">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">追蹤總數</p>
                <div class="text-2xl font-black text-slate-800" id="stat-total">0</div>
            </div>
            <div class="glass p-5 rounded-[2rem] card-shadow border-b-4 border-b-amber-400">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">面試邀約</p>
                <div class="text-2xl font-black text-amber-500" id="stat-interview">0</div>
            </div>
            <div class="glass p-5 rounded-[2rem] card-shadow border-b-4 border-b-indigo-400">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">成功率</p>
                <div class="text-2xl font-black text-indigo-600" id="stat-rate">0%</div>
            </div>
            <div class="glass p-5 rounded-[2rem] card-shadow border-b-4 border-b-green-400">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Offers</p>
                <div class="text-2xl font-black text-green-600" id="stat-offers">0</div>
            </div>
        </div>

        <!-- 職缺列表 -->
        <div id="list" class="space-y-4">
            <div id="loading-text" class="text-center py-20 text-slate-300 animate-pulse font-medium">連線至雲端資料庫中...</div>
        </div>
    </div>

    <script type="module">
        import { collection, addDoc, updateDoc, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.renderJobs = (jobs) => {
            const container = document.getElementById('list');
            if (jobs.length === 0) {
                container.innerHTML = `<div class="bg-white/50 p-16 rounded-[2.5rem] border-2 border-dashed border-slate-200 text-center text-slate-400 text-sm">目前沒有紀錄，點擊按鈕新增第一筆申請！</div>`;
                return;
            }
            container.innerHTML = '';
            jobs.forEach(job => {
                const div = document.createElement('div');
                div.className = "glass p-6 rounded-[2rem] card-shadow flex flex-col md:flex-row justify-between items-start md:items-center gap-4 transition-all hover:scale-[1.01]";
                div.innerHTML = `
                    <div class="flex-1">
                        <h3 class="font-bold text-slate-800 text-lg">${job.title || '未命名職位'}</h3>
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-tight mt-1">${job.company || '未知公司'}</p>
                    </div>
                    <div class="flex items-center gap-4 w-full md:w-auto">
                        <select onchange="updateStatus('${job.id}', this.value)" class="status-pill ${getStatusClass(job.status)} flex-1 md:flex-none">
                            <option value="未投遞" ${job.status === '未投遞' ? 'selected' : ''}>未投遞</option>
                            <option value="已投遞" ${job.status === '已投遞' ? 'selected' : ''}>已投遞</option>
                            <option value="面試中" ${job.status === '面試中' ? 'selected' : ''}>面試中</option>
                            <option value="拒信" ${job.status === '拒信' ? 'selected' : ''}>拒信</option>
                            <option value="錄取" ${job.status === '錄取' ? 'selected' : ''}>錄取</option>
                        </select>
                        <button onclick="delJob('${job.id}')" class="text-slate-200 hover:text-red-400 transition-colors p-1">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
        };

        window.updateStatus = async (id, status) => {
            const docRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'jobs', id);
            await updateDoc(docRef, { status });
        };

        window.delJob = async (id) => {
            if (confirm("確定刪除這筆申請紀錄嗎？")) {
                const docRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'jobs', id);
                await deleteDoc(docRef);
            }
        };

        window.addNewJob = async () => {
            const title = prompt("申請職稱:");
            const company = prompt("公司名稱:");
            if (title && company) {
                const collRef = collection(window.db, 'artifacts', window.appId, 'public', 'data', 'jobs');
                await addDoc(collRef, { title, company, status: '未投遞', createdAt: serverTimestamp() });
            }
        };

        function getStatusClass(s) {
            if (s === '已投遞') return 'status-applied';
            if (s === '面試中') return 'status-interview';
            if (s === '拒信') return 'status-rejected';
            if (s === '錄取') return 'status-offer';
            return 'status-not-applied';
        }

        window.updateStats = (jobs) => {
            document.getElementById('stat-total').innerText = jobs.length;
            document.getElementById('stat-interview').innerText = jobs.filter(j => j.status === '面試中').length;
            const offers = jobs.filter(j => j.status === '錄取').length;
            document.getElementById('stat-offers').innerText = offers;
            const rate = jobs.length ? Math.round((offers / jobs.length) * 100) : 0;
            document.getElementById('stat-rate').innerText = rate + "%";
        }
    </script>
</body>
</html>
