<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Hub | Chloe's Job Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fcfdfe; 
            color: #1e293b; 
        }
        .ai-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .glass { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(241, 245, 249, 1); 
        }
        .status-pill { padding: 4px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; }
        .status-applied { background: #e0f2fe; color: #0369a1; }
        .status-interview { background: #fef9c3; color: #854d0e; }
        .status-rejected { background: #fee2e2; color: #991b1b; }
        .status-offer { background: #dcfce7; color: #166534; }
        .status-not-applied { background: #f1f5f9; color: #64748b; }
        
        .job-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #f1f5f9;
        }
        .job-card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            border-color: #e2e8f0;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen pb-20">
    <div class="max-w-6xl mx-auto px-6 py-12">
        <!-- Header -->
        <div class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight text-slate-900">Career <span class="text-indigo-600">Hub</span></h1>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] mt-2">Chloe's Strategic Job Tracker</p>
            </div>
            <div class="flex gap-3">
                <button onclick="toggleAIPanel()" class="bg-white border border-slate-200 text-slate-600 px-6 py-3 rounded-2xl text-sm font-bold hover:bg-slate-50 transition-all flex items-center gap-2">
                    ✨ AI 分析 JD
                </button>
                <button onclick="openModal()" class="ai-gradient text-white px-8 py-3 rounded-2xl text-sm font-bold shadow-lg shadow-indigo-200 hover:opacity-90 transition-all">
                    ＋ 新增職位
                </button>
            </div>
        </div>

        <!-- AI Panel -->
        <div id="ai-panel" class="hidden mb-12 glass p-8 rounded-[2.5rem] shadow-sm border-2 border-indigo-50">
            <h2 class="text-xl font-bold mb-4">🤖 Gemini 智慧分析</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <textarea id="jd-input" rows="5" class="w-full p-4 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-indigo-500 bg-slate-50/50 text-sm" placeholder="貼上職缺描述 (JD)..."></textarea>
                    <button onclick="analyzeJD()" id="analyze-btn" class="w-full mt-3 bg-slate-900 text-white py-3 rounded-xl font-bold text-sm">開始分析</button>
                </div>
                <div id="ai-result" class="bg-white p-6 rounded-2xl border border-dashed border-slate-200 flex items-center justify-center min-h-[160px]">
                    <p class="text-slate-400 text-sm italic">分析結果將在此生成結構化列點...</p>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12">
            <div class="glass p-8 rounded-[2rem] text-center shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">總申請</p>
                <div class="text-4xl font-black" id="stat-total">0</div>
            </div>
            <div class="glass p-8 rounded-[2rem] text-center shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">面試</p>
                <div class="text-4xl font-black text-amber-500" id="stat-interview">0</div>
            </div>
            <div class="glass p-8 rounded-[2rem] text-center shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">勝率</p>
                <div class="text-4xl font-black text-indigo-600" id="stat-winrate">0%</div>
            </div>
            <div class="glass p-8 rounded-[2rem] text-center shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Offers</p>
                <div class="text-4xl font-black text-green-600" id="stat-offers">0</div>
            </div>
        </div>

        <!-- Job List -->
        <div id="job-list" class="space-y-4">
            <div id="loading-state" class="flex flex-col items-center justify-center py-20 text-slate-400">
                <div class="loader mb-4"></div>
                <p class="text-sm">正在與資料庫建立連線...</p>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-2xl shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-8">
                <h2 id="modal-title" class="text-2xl font-extrabold text-slate-800">職位資訊</h2>
                <button onclick="closeModal()" class="text-slate-300 hover:text-slate-500">✕</button>
            </div>

            <!-- Quick Paste Area -->
            <div class="mb-8 p-5 bg-indigo-50/50 rounded-2xl border border-indigo-100">
                <label class="text-[10px] font-black text-indigo-500 uppercase tracking-tighter">✨ 自動填表 (貼上 AI 列點資訊後會自動掃描內容)</label>
                <textarea id="quick-paste" oninput="autoFillFields()" class="w-full mt-2 p-3 text-xs bg-white border-none rounded-xl outline-none focus:ring-1 focus:ring-indigo-300" placeholder="例如：- 職稱: Product Analyst..."></textarea>
            </div>

            <div class="space-y-5">
                <input type="hidden" id="in-id">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">職缺名稱</label>
                        <input id="in-title" type="text" class="w-full px-4 py-3 bg-slate-50 rounded-xl outline-none border border-transparent focus:border-indigo-200 mt-1 text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">公司名稱</label>
                        <input id="in-company" type="text" class="w-full px-4 py-3 bg-slate-50 rounded-xl outline-none border border-transparent focus:border-indigo-200 mt-1 text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">類別</label>
                        <select id="in-type" class="w-full px-4 py-3 bg-slate-50 rounded-xl mt-1 text-sm outline-none border border-transparent">
                            <option value="Intern">Intern</option>
                            <option value="Full-time">Full-time</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">工作型態</label>
                        <select id="in-location" class="w-full px-4 py-3 bg-slate-50 rounded-xl mt-1 text-sm outline-none border border-transparent">
                            <option value="On-site">On-site</option>
                            <option value="Remote">Remote</option>
                            <option value="Hybrid">Hybrid</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">狀態更新</label>
                        <select id="in-status" class="w-full px-4 py-3 bg-slate-50 rounded-xl mt-1 text-sm outline-none border border-transparent">
                            <option value="未投遞">未投遞</option>
                            <option value="已投遞">已投遞</option>
                            <option value="收到面試邀請">收到面試邀請</option>
                            <option value="錄取">錄取</option>
                            <option value="拒信">拒信</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">薪資</label>
                        <input id="in-salary" type="text" placeholder="例如: $100k - $120k" class="w-full px-4 py-3 bg-slate-50 rounded-xl outline-none border border-transparent focus:border-indigo-200 mt-1 text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">適配度分數 (0-10)</label>
                        <input id="in-score" type="number" step="0.1" class="w-full px-4 py-3 bg-slate-50 rounded-xl outline-none border border-transparent focus:border-indigo-200 mt-1 text-sm">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">職缺連結 (Job URL)</label>
                    <input id="in-url" type="text" placeholder="https://..." class="w-full px-4 py-3 bg-slate-50 rounded-xl outline-none border border-transparent focus:border-indigo-200 mt-1 text-sm">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Network (URL / 聯絡人)</label>
                    <input id="in-network" type="text" placeholder="LinkedIn URL or Referral Info" class="w-full px-4 py-3 bg-slate-50 rounded-xl outline-none border border-transparent focus:border-indigo-200 mt-1 text-sm">
                </div>
            </div>

            <div class="flex gap-4 mt-10">
                <button id="btn-delete" onclick="handleDelete()" class="hidden flex-none px-6 py-4 font-bold text-red-400 hover:text-red-600 text-sm">刪除</button>
                <button onclick="submitJob()" id="btn-submit" class="flex-1 ai-gradient text-white py-4 rounded-2xl font-bold shadow-lg text-sm">儲存資訊</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAOJJfeH_3WSlCl3Ncyt8RRzttu8cY77Sg",
            authDomain: "job-searching-tracker.firebaseapp.com",
            projectId: "job-searching-tracker",
            storageBucket: "job-searching-tracker.firebasestorage.app",
            messagingSenderId: "41615562183",
            appId: "1:41615562183:web:654666dd152ed7455775e2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'chloe-main-tracker';

        let allJobs = [];
        let currentUser = null;
        let unsubscribeJobs = null;
        const geminiKey = " "; // 環境自動注入

        // Auth Logic with Error Handling
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    // Try Custom Token first
                    await signInWithCustomToken(auth, __initial_auth_token).catch(async (error) => {
                        console.warn("Custom token failed, falling back to anonymous sign-in:", error);
                        await signInAnonymously(auth);
                    });
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth Initialization Error:", error);
            }
        };

        initAuth();

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            
            // Clean up existing listener if any
            if (unsubscribeJobs) unsubscribeJobs();

            if (user) {
                console.log("Authenticated as:", user.uid);
                const userJobsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'jobs');
                const q = query(userJobsRef, orderBy('updatedAt', 'desc'));
                
                unsubscribeJobs = onSnapshot(q, (snap) => {
                    allJobs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    renderJobs();
                    updateStats();
                }, (err) => {
                    console.error("Firestore Listener Error:", err);
                    if (err.code === 'permission-denied') {
                        document.getElementById('job-list').innerHTML = `
                            <div class="text-center py-20 text-red-400 text-sm">
                                存取權限被拒。請確認 Firebase 安全規則設定。
                            </div>`;
                    }
                });
            } else {
                document.getElementById('job-list').innerHTML = `
                    <div class="text-center py-20 text-slate-300 text-sm">正在等待身份驗證...</div>`;
            }
        });

        function renderJobs() {
            const list = document.getElementById('job-list');
            if (allJobs.length === 0) {
                list.innerHTML = `<div class="text-center py-20 text-slate-300 text-sm">目前尚無職位記錄，點擊右上方開始新增。</div>`;
                return;
            }
            list.innerHTML = allJobs.map(job => `
                <div onclick="openEditModal('${job.id}')" class="job-card bg-white p-6 rounded-[2rem] flex items-center justify-between cursor-pointer">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <h3 class="font-bold text-lg text-slate-800">${job.title}</h3>
                            <span class="text-[9px] font-black px-2 py-0.5 bg-slate-100 text-slate-500 rounded uppercase tracking-tighter">${job.type}</span>
                            <span class="text-[9px] font-black px-2 py-0.5 bg-indigo-50 text-indigo-500 rounded uppercase tracking-tighter">${job.location || 'On-site'}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <p class="text-slate-400 font-bold text-xs uppercase tracking-wider">${job.company}</p>
                            ${job.salary ? `<span class="text-[10px] text-green-500 font-bold">💰 ${job.salary}</span>` : ''}
                        </div>
                    </div>
                    <div class="flex items-center gap-8">
                        <div class="text-right">
                            <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest">Match</p>
                            <p class="font-black text-lg ${parseFloat(job.score) >= 7 ? 'text-indigo-600' : 'text-slate-400'}">${job.score || '0.0'}</p>
                        </div>
                        <div class="status-pill ${getStatusClass(job.status)} min-w-[100px] text-center">${job.status}</div>
                    </div>
                </div>
            `).join('');
        }

        function getStatusClass(s) {
            const m = { '已投遞': 'status-applied', '收到面試邀請': 'status-interview', '錄取': 'status-offer', '拒信': 'status-rejected' };
            return m[s] || 'status-not-applied';
        }

        window.toggleAIPanel = () => document.getElementById('ai-panel').classList.toggle('hidden');

        window.analyzeJD = async () => {
            const jd = document.getElementById('jd-input').value;
            if (!jd) return;
            const btn = document.getElementById('analyze-btn');
            const resultDiv = document.getElementById('ai-result');
            
            btn.innerText = "Gemini 分析中...";
            btn.disabled = true;

            const prompt = `你是一位求職專家。分析以下 JD 並回傳 JSON。
            JD: ${jd}
            請回傳格式：
            {
              "score": 0-10,
              "title": "職稱",
              "company": "公司",
              "type": "Intern/Full-time",
              "location": "On-site/Remote/Hybrid",
              "salary": "薪資(若無則填未知)",
              "bullets": "請生成以下列點式資訊：\\n- 職稱: [內容]\\n- 公司: [內容]\\n- 類型: [內容]\\n- 工作型態: [內容]\\n- 預估薪資: [內容]\\n- 適配度分數: [分數]\\n- 核心匹配原因: [原因]"
            }`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" } })
                });
                const data = await response.json();
                const res = JSON.parse(data.candidates[0].content.parts[0].text);
                
                resultDiv.innerHTML = `
                    <div class="w-full text-left space-y-3">
                        <div class="flex justify-between items-center">
                            <span class="text-2xl font-black text-indigo-600">匹配得分: ${res.score}</span>
                            ${res.score >= 6 ? '<span class="status-pill status-offer">推薦投遞</span>' : ''}
                        </div>
                        <pre class="text-[11px] bg-slate-50 p-4 rounded-xl border border-slate-100 whitespace-pre-wrap leading-relaxed">${res.bullets}</pre>
                        <button onclick='quickImportAI(${JSON.stringify(res).replace(/'/g, "&apos;")})' class="w-full py-2 bg-indigo-600 text-white rounded-lg font-bold text-xs">直接帶入表單</button>
                    </div>
                `;
            } catch (e) {
                resultDiv.innerHTML = `<p class="text-red-500 text-xs">分析出錯，請檢查 JD 內容或 API 狀態。</p>`;
            } finally {
                btn.innerText = "開始分析";
                btn.disabled = false;
            }
        };

        window.quickImportAI = (res) => {
            openModal();
            document.getElementById('in-title').value = res.title;
            document.getElementById('in-company').value = res.company;
            document.getElementById('in-type').value = res.type;
            document.getElementById('in-location').value = res.location;
            document.getElementById('in-salary').value = res.salary === '未知' ? '' : res.salary;
            document.getElementById('in-score').value = res.score;
            document.getElementById('quick-paste').value = res.bullets;
        };

        window.autoFillFields = () => {
            const val = document.getElementById('quick-paste').value;
            const config = [
                { id: 'in-title', regex: /職稱[:：]\s*(.*)/ },
                { id: 'in-company', regex: /公司[:：]\s*(.*)/ },
                { id: 'in-salary', regex: /薪資[:：]\s*(.*)/ },
                { id: 'in-score', regex: /分數[:：]\s*(\d+(\.\d+)?)/ }
            ];
            config.forEach(c => {
                const match = val.match(c.regex);
                if (match && match[1]) document.getElementById(c.id).value = match[1].trim();
            });
        };

        window.openModal = () => {
            document.getElementById('modal-title').innerText = "新增職位追蹤";
            ['in-id', 'in-title', 'in-company', 'in-salary', 'in-score', 'in-url', 'in-network', 'quick-paste'].forEach(id => {
                document.getElementById(id).value = "";
            });
            document.getElementById('in-status').value = "未投遞";
            document.getElementById('btn-delete').classList.add('hidden');
            document.getElementById('modal').classList.replace('hidden', 'flex');
        };

        window.openEditModal = (id) => {
            const job = allJobs.find(j => j.id === id);
            if (!job) return;
            document.getElementById('modal-title').innerText = "編輯職位資訊";
            document.getElementById('in-id').value = id;
            document.getElementById('in-title').value = job.title || '';
            document.getElementById('in-company').value = job.company || '';
            document.getElementById('in-type').value = job.type || 'Intern';
            document.getElementById('in-location').value = job.location || 'On-site';
            document.getElementById('in-status').value = job.status || '未投遞';
            document.getElementById('in-salary').value = job.salary || '';
            document.getElementById('in-score').value = job.score || '';
            document.getElementById('in-url').value = job.url || '';
            document.getElementById('in-network').value = job.network || '';
            document.getElementById('btn-delete').classList.remove('hidden');
            document.getElementById('modal').classList.replace('hidden', 'flex');
        };

        window.closeModal = () => document.getElementById('modal').classList.replace('flex', 'hidden');

        window.submitJob = async () => {
            if (!currentUser) return;
            const id = document.getElementById('in-id').value;
            const data = {
                title: document.getElementById('in-title').value,
                company: document.getElementById('in-company').value,
                type: document.getElementById('in-type').value,
                location: document.getElementById('in-location').value,
                status: document.getElementById('in-status').value,
                salary: document.getElementById('in-salary').value,
                score: document.getElementById('in-score').value,
                url: document.getElementById('in-url').value,
                network: document.getElementById('in-network').value,
                updatedAt: serverTimestamp()
            };
            
            if (!data.title || !data.company) return;

            try {
                const userJobsRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'jobs');
                if (id) {
                    await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'jobs', id), data);
                } else {
                    data.createdAt = serverTimestamp();
                    await addDoc(userJobsRef, data);
                }
                closeModal();
            } catch (err) {
                console.error("Save Error:", err);
            }
        };

        window.handleDelete = async () => {
            if (confirm("確定要刪除這筆紀錄嗎？")) {
                const id = document.getElementById('in-id').value;
                if (!id || !currentUser) return;
                await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'jobs', id));
                closeModal();
            }
        };

        function updateStats() {
            const total = allJobs.length;
            const applied = allJobs.filter(j => j.status !== '未投遞').length;
            const interviews = allJobs.filter(j => j.status === '收到面試邀請').length;
            const offers = allJobs.filter(j => j.status === '錄取').length;
            
            document.getElementById('stat-total').innerText = applied;
            document.getElementById('stat-interview').innerText = interviews;
            document.getElementById('stat-offers').innerText = offers;
            document.getElementById('stat-winrate').innerText = applied ? Math.round((offers / applied) * 100) + "%" : "0%";
        }
    </script>
</body>
</html>
