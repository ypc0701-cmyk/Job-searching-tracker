<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Career Hub | List View Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .ai-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(241, 245, 249, 1); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #6366f1; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .input-field { width: 100%; padding: 12px 16px; background-color: #ffffff; border-radius: 12px; font-size: 14px; border: 1px solid #e2e8f0; outline: none; transition: border 0.2s; }
        .input-field:focus { border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
        .job-row:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Firebase Setup Overlay -->
    <div id="setup-overlay" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[100] flex items-center justify-center p-6 hidden">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-md w-full shadow-2xl">
            <h2 class="text-2xl font-bold text-slate-800 mb-2 text-center">資料庫設定 🔐</h2>
            <p class="text-slate-500 text-sm mb-8 text-center">請輸入 Firebase Config JSON 以啟用雲端儲存。</p>
            <div class="space-y-4">
                <textarea id="setup-fb-config" rows="8" class="input-field font-mono text-[10px] bg-slate-50" placeholder='{ "apiKey": "...", "authDomain": "...", ... }'></textarea>
            </div>
            <button onclick="saveSetup()" class="w-full mt-8 ai-gradient text-white py-4 rounded-2xl font-bold hover:scale-[1.02] transition-transform">啟動系統</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-6 py-12">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight text-slate-900">Career <span class="text-indigo-600">Hub</span></h1>
                <p class="text-slate-400 text-[10px] font-bold uppercase mt-2 tracking-widest">Chloe's Strategic Tracker (List View)</p>
            </div>
            <div class="flex flex-wrap gap-3">
                <div id="conn-status" class="flex items-center gap-2 px-4 py-2 bg-white border border-slate-100 rounded-full text-[10px] font-bold text-slate-400 shadow-sm">
                    <span class="w-2 h-2 rounded-full bg-slate-300"></span> 連線中...
                </div>
                <button onclick="toggleAIPanel()" class="bg-white border border-slate-200 text-slate-600 px-6 py-3 rounded-2xl text-sm font-bold hover:bg-slate-50 transition-all shadow-sm">✨ AI 分析 JD</button>
                <button onclick="openModal()" class="ai-gradient text-white px-8 py-3 rounded-2xl text-sm font-bold shadow-lg hover:opacity-90 transition-opacity">＋ 新增職位</button>
                <button onclick="showSetup()" class="p-3 bg-white border border-slate-200 rounded-2xl text-slate-400 hover:text-indigo-500 transition-colors">⚙️</button>
            </div>
        </div>

        <!-- AI Panel -->
        <div id="ai-panel" class="hidden mb-12 glass p-8 rounded-[2.5rem] shadow-xl border-2 border-indigo-50">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <h2 class="text-lg font-bold mb-4 text-slate-800 flex items-center gap-2">🤖 內建 AI 分析 <span class="text-[10px] bg-indigo-100 text-indigo-500 px-2 py-0.5 rounded">Native Mode</span></h2>
                    <textarea id="jd-input" rows="8" class="input-field mb-3 bg-slate-50/50" placeholder="貼上 Job Description..."></textarea>
                    <button onclick="analyzeJDNative()" id="analyze-btn" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold text-sm flex justify-center items-center gap-2 hover:bg-slate-800 transition-colors">
                        <span>啟動 Chat AI 分析</span>
                        <div id="ai-loader" class="hidden loader border-t-white"></div>
                    </button>
                </div>
                <div id="ai-result" class="bg-white/50 p-6 rounded-2xl border-2 border-dashed border-slate-100 flex flex-col justify-center">
                    <p class="text-sm italic text-slate-400 text-center">分析結果將顯示於此...</p>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12" id="stats-container"></div>

        <!-- Search & List Header -->
        <div class="mb-6">
            <input type="text" id="search-input" oninput="render()" placeholder="搜尋公司、職稱或備註..." class="w-full px-6 py-4 bg-white border border-slate-200 rounded-2xl text-sm shadow-sm outline-none focus:border-indigo-400">
        </div>

        <!-- Job List -->
        <div class="space-y-3" id="job-list">
        </div>
    </div>

    <!-- Job Modal -->
    <div id="modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-2xl shadow-2xl overflow-y-auto max-h-[95vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modal-title" class="text-2xl font-extrabold text-slate-800">職位詳情</h2>
                <button onclick="closeModal()" class="text-slate-300 hover:text-slate-500 text-xl transition-colors">✕</button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">職缺名稱</label><input id="in-title" class="input-field"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">公司名稱</label><input id="in-company" class="input-field"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">類別 (Intern/Full-time)</label><input id="in-category" class="input-field"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">工作型態</label><input id="in-type" class="input-field"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">當前狀態</label>
                    <select id="in-status" class="input-field cursor-pointer">
                        <option value="未投遞">未投遞</option>
                        <option value="已投遞">已投遞</option>
                        <option value="收到面試邀請">收到面試邀請</option>
                        <option value="拒信">拒信</option>
                        <option value="錄取">錄取</option>
                    </select>
                </div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">適配分數 (0-10)</label>
                    <input id="in-score" type="number" step="0.1" class="input-field" placeholder="例如: 8.5">
                </div>
                <div class="col-span-full"><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">薪資範圍</label><input id="in-salary" class="input-field"></div>
                <div class="col-span-full"><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">職缺 URL</label><input id="in-job-url" class="input-field"></div>
                <div class="col-span-full"><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Network 備註</label><input id="in-network" class="input-field"></div>
                <div class="col-span-full"><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">分析筆記</label><textarea id="in-notes" rows="3" class="input-field"></textarea></div>
            </div>

            <div class="bg-indigo-50/50 p-5 rounded-2xl mb-6 border border-indigo-100/50">
                <p class="text-[10px] font-bold text-indigo-400 uppercase mb-2">自動填寫區塊</p>
                <textarea id="ai-scan-box" rows="2" class="input-field text-xs bg-white/80" placeholder="貼上 AI 生成的結構化內容後點擊下方同步..."></textarea>
                <button onclick="scanAIContent()" class="mt-2 text-[10px] font-black text-indigo-500 hover:text-indigo-700 transition-colors uppercase tracking-wider">➔ 立即同步至上方欄位</button>
            </div>

            <div class="flex gap-4">
                <button id="btn-delete" onclick="deleteJob()" class="hidden px-6 font-bold text-red-400 text-sm hover:text-red-600 transition-colors">刪除紀錄</button>
                <button onclick="saveJob()" class="flex-1 ai-gradient text-white py-4 rounded-2xl font-bold shadow-lg hover:scale-[1.01] transition-transform">儲存職位資料</button>
            </div>
            <input type="hidden" id="in-id">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        let db, auth, allJobs = [], currentUser = null;
        const APP_ID = typeof __app_id !== 'undefined' ? __app_id : "chloe-career-listview";
        const apiKey = ""; // API Key will be injected by the environment

        window.onload = () => {
            const savedConfig = localStorage.getItem('chloe_fb_config') || (typeof __firebase_config !== 'undefined' ? __firebase_config : null);
            if (!savedConfig) {
                document.getElementById('setup-overlay').classList.remove('hidden');
            } else {
                startApp(typeof savedConfig === 'string' ? JSON.parse(savedConfig) : savedConfig);
            }
        };

        window.saveSetup = () => {
            const configText = document.getElementById('setup-fb-config').value.trim();
            if(configText) {
                localStorage.setItem('chloe_fb_config', configText);
                location.reload();
            }
        };

        window.showSetup = () => document.getElementById('setup-overlay').classList.remove('hidden');

        async function startApp(config) {
            const statusEl = document.getElementById('conn-status');
            try {
                const app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                await initAuth();

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        statusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> 雲端同步中`;
                        const jobsCol = collection(db, 'artifacts', APP_ID, 'users', user.uid, 'jobs');
                        onSnapshot(query(jobsCol, orderBy('updatedAt', 'desc')), (snap) => {
                            allJobs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                            render();
                        }, (err) => console.error(err));
                    }
                });
            } catch (err) { 
                statusEl.innerHTML = "連線失敗"; 
                console.error(err); 
            }
        }

        window.analyzeJDNative = async () => {
            const jd = document.getElementById('jd-input').value;
            if (!jd) return;

            const btn = document.getElementById('analyze-btn');
            const loader = document.getElementById('ai-loader');
            const resArea = document.getElementById('ai-result');
            
            btn.disabled = true; loader.classList.remove('hidden');
            resArea.innerHTML = `<p class="text-xs text-indigo-500 animate-pulse text-center">Gemini 正在深度掃描 JD...</p>`;

            const systemPrompt = `妳是 Chloe 的職業顧問。請根據以下 JD 進行適配度分析。
            候選人背景：MSBA 學生，具備 1.8M 數據處理經驗與創業背景。
            請嚴格遵守以下格式輸出：
            分數: [0-10]
            職稱: [名稱]
            公司: [名稱]
            類別: [Intern/Full-time]
            工作型態: [On-site/Remote/Hybrid]
            薪資: [範圍]
            職缺URL: [網址]
            理由: [兩句話總結適配點]
            建議: [對策]`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `JD內容: ${jd}` }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });
                
                const result = await response.json();
                const aiText = result.candidates?.[0]?.content?.parts?.[0]?.text || "分析失敗";
                
                resArea.innerHTML = `
                    <div class="text-left text-xs bg-slate-50 p-4 rounded-xl border border-indigo-100 max-h-[300px] overflow-y-auto">
                        <pre class="whitespace-pre-wrap font-sans text-slate-700 leading-relaxed">${aiText}</pre>
                        <button onclick="copyAndOpen(\`${aiText.replace(/`/g, "\\`").replace(/\$/g, "\\$")}\`)" class="w-full mt-4 py-3 ai-gradient text-white rounded-lg font-bold shadow-md">同步並新增</button>
                    </div>`;
            } catch (e) {
                resArea.innerHTML = `<div class="p-4 text-red-400 text-xs text-center">錯誤。請檢查 API Key 或網路。</div>`;
            } finally {
                btn.disabled = false; loader.classList.add('hidden');
            }
        };

        window.copyAndOpen = (text) => {
            openModal();
            document.getElementById('ai-scan-box').value = text;
            scanAIContent();
        };

        window.scanAIContent = () => {
            const text = document.getElementById('ai-scan-box').value;
            const mapping = {
                "職稱": "in-title", "公司": "in-company", "類別": "in-category",
                "工作型態": "in-type", "薪資": "in-salary", "職缺URL": "in-job-url", "分數": "in-score"
            };
            Object.keys(mapping).forEach(key => {
                const regex = new RegExp(`${key}[:：]\\s*(.*)`);
                const match = text.match(regex);
                if (match) document.getElementById(mapping[key]).value = match[1].trim();
            });
            const r = text.match(/理由[:：]\s*(.*)/);
            const s = text.match(/建議[:：]\s*(.*)/);
            if(r || s) document.getElementById('in-notes').value = `${r?.[1]||""}\n\n${s?.[1]||""}`;
        };

        window.saveJob = async () => {
            if (!currentUser) return;
            const id = document.getElementById('in-id').value;
            const data = {
                title: document.getElementById('in-title').value,
                company: document.getElementById('in-company').value,
                category: document.getElementById('in-category').value,
                type: document.getElementById('in-type').value,
                status: document.getElementById('in-status').value,
                score: parseFloat(document.getElementById('in-score').value) || 0,
                salary: document.getElementById('in-salary').value,
                jobUrl: document.getElementById('in-job-url').value,
                network: document.getElementById('in-network').value,
                notes: document.getElementById('in-notes').value,
                updatedAt: serverTimestamp()
            };
            try {
                if(id) await updateDoc(doc(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'jobs', id), data);
                else await addDoc(collection(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'jobs'), { ...data, createdAt: serverTimestamp() });
                closeModal();
            } catch (e) { console.error(e); }
        };

        window.render = () => {
            const list = document.getElementById('job-list');
            const search = document.getElementById('search-input').value.toLowerCase();
            const filtered = allJobs.filter(j => (j.company + j.title + (j.notes||"")).toLowerCase().includes(search));
            
            if (filtered.length === 0) {
                list.innerHTML = `<div class="text-center py-20 text-slate-300 font-bold">目前沒有資料</div>`;
                updateStats([]);
                return;
            }

            list.innerHTML = filtered.map(j => `
                <div onclick="openEdit('${j.id}')" class="job-row bg-white px-6 py-4 rounded-2xl shadow-sm border border-slate-100 cursor-pointer transition-all flex flex-col md:flex-row items-center gap-4">
                    <div class="flex md:flex-col items-center justify-center min-w-[60px] gap-1">
                        <span class="text-xl font-black text-indigo-600">${j.score || 0}</span>
                        <span class="text-[8px] font-black text-slate-300 uppercase tracking-tighter">MATCH SCORE</span>
                    </div>
                    <div class="flex-1 min-w-0 text-center md:text-left">
                        <div class="flex flex-wrap items-center gap-2 mb-1 justify-center md:justify-start">
                            <h3 class="font-bold text-slate-800 truncate text-base">${j.title}</h3>
                            <span class="text-[9px] font-black px-1.5 py-0.5 bg-slate-100 text-slate-500 rounded uppercase">${j.category || 'N/A'}</span>
                        </div>
                        <p class="text-xs text-slate-400 flex items-center gap-2 justify-center md:justify-start">
                            <span class="font-bold text-slate-500">${j.company}</span>
                            ${j.type ? `<span class="w-1 h-1 bg-slate-200 rounded-full"></span> <span>${j.type}</span>` : ''}
                        </p>
                    </div>
                    <div class="md:w-32 flex justify-center">
                        <span class="text-[10px] font-bold px-4 py-1.5 rounded-full ${getStatusClass(j.status)}">${j.status}</span>
                    </div>
                    <div class="flex items-center gap-4">
                        ${j.jobUrl ? `<a href="${j.jobUrl}" target="_blank" class="p-2 text-slate-300 hover:text-indigo-500" onclick="event.stopPropagation()">🔗</a>` : ''}
                        <div class="text-slate-200">❯</div>
                    </div>
                </div>
            `).join('');
            updateStats(allJobs);
        };

        function getStatusClass(s) {
            if (s === '已投遞') return 'bg-green-50 text-green-600 border-green-100';
            if (s === '收到面試邀請') return 'bg-amber-50 text-amber-600 border-amber-100 animate-pulse';
            if (s === '拒信') return 'bg-red-50 text-red-600 border-red-100';
            if (s === '錄取') return 'bg-indigo-50 text-indigo-600 border-indigo-100 font-black';
            return 'bg-slate-50 text-slate-400 border-slate-100';
        }

        function updateStats(jobs) {
            const container = document.getElementById('stats-container');
            const stats = [
                { label: "總數", val: jobs.length, color: "text-slate-800" },
                { label: "面試", val: jobs.filter(j => j.status === '收到面試邀請').length, color: "text-amber-500" },
                { label: "已投遞", val: jobs.filter(j => j.status !== '未投遞').length, color: "text-indigo-600" },
                { label: "錄取", val: jobs.filter(j => j.status === '錄取').length, color: "text-green-600" }
            ];
            container.innerHTML = stats.map(s => `
                <div class="glass p-6 rounded-[2rem] text-center shadow-sm">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-1">${s.label}</p>
                    <div class="text-3xl font-black ${s.color}">${s.val}</div>
                </div>`).join('');
        }

        window.openModal = () => {
            document.getElementById('in-id').value = "";
            document.getElementById('modal-title').innerText = "新增應徵紀錄";
            document.querySelectorAll('#modal input, #modal textarea').forEach(i => i.value = "");
            document.getElementById('in-status').value = "未投遞";
            document.getElementById('btn-delete').classList.add('hidden');
            document.getElementById('modal').classList.replace('hidden', 'flex');
        };

        window.openEdit = (id) => {
            const j = allJobs.find(x => x.id === id);
            if (!j) return;
            document.getElementById('in-id').value = id;
            document.getElementById('modal-title').innerText = "修改職位詳情";
            document.getElementById('in-title').value = j.title || "";
            document.getElementById('in-company').value = j.company || "";
            document.getElementById('in-category').value = j.category || "";
            document.getElementById('in-type').value = j.type || "";
            document.getElementById('in-status').value = j.status || "未投遞";
            document.getElementById('in-score').value = j.score || 0;
            document.getElementById('in-salary').value = j.salary || "";
            document.getElementById('in-job-url').value = j.jobUrl || "";
            document.getElementById('in-network').value = j.network || "";
            document.getElementById('in-notes').value = j.notes || "";
            document.getElementById('btn-delete').classList.remove('hidden');
            document.getElementById('modal').classList.replace('hidden', 'flex');
        };

        window.deleteJob = async () => { 
            if (!currentUser) return;
            if(confirm("確定刪除？")) { 
                await deleteDoc(doc(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'jobs', document.getElementById('in-id').value)); 
                closeModal(); 
            } 
        };
        
        window.closeModal = () => document.getElementById('modal').classList.replace('flex', 'hidden');
        window.toggleAIPanel = () => document.getElementById('ai-panel').classList.toggle('hidden');
    </script>
</body>
</html>
