<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chloe's Job Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .ai-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .status-pill { padding: 4px 12px; border-radius: 10px; font-size: 0.75rem; font-weight: 700; border: none; outline: none; cursor: pointer; appearance: none; }
        .status-applied { background: #dcfce7; color: #166534; }
        .status-not-applied { background: #f1f5f9; color: #475569; }
        .status-interview { background: #fef9c3; color: #854d0e; }
        .status-rejected { background: #fee2e2; color: #991b1b; }
        .status-offer { background: #e0f2fe; color: #0369a1; }
    </style>
</head>
<body class="min-h-screen pb-10">
    <div class="max-w-4xl mx-auto px-6 py-10">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">Career <span class="ai-gradient text-transparent bg-clip-text">Hub</span></h1>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1">Chloe's Personal Tracker</p>
            </div>
            <button onclick="window.addNewJob()" class="ai-gradient text-white px-6 py-2.5 rounded-2xl text-sm font-bold shadow-lg hover:shadow-indigo-200 active:scale-95 transition-all">
                ＋ 新增紀錄
            </button>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="glass p-5 rounded-3xl shadow-sm border-b-4 border-slate-200 text-center">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">總申請</p>
                <div class="text-2xl font-black text-slate-800" id="stat-total">0</div>
            </div>
            <div class="glass p-5 rounded-3xl shadow-sm border-b-4 border-amber-300 text-center">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">面試中</p>
                <div class="text-2xl font-black text-amber-500" id="stat-interview">0</div>
            </div>
            <div class="glass p-5 rounded-3xl shadow-sm border-b-4 border-indigo-300 text-center">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">成功率</p>
                <div class="text-2xl font-black text-indigo-600" id="stat-rate">0%</div>
            </div>
            <div class="glass p-5 rounded-3xl shadow-sm border-b-4 border-green-300 text-center">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Offers</p>
                <div class="text-2xl font-black text-green-600" id="stat-offers">0</div>
            </div>
        </div>

        <div id="list" class="space-y-4">
            <div id="loading-state" class="text-center py-20 bg-white rounded-3xl border-2 border-dashed border-slate-200">
                <p class="text-slate-400 font-medium animate-pulse">正在連線至雲端資料庫...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAOJJfeH_3WSlCl3Ncyt8RRzttu8cY77Sg",
            authDomain: "job-searching-tracker.firebaseapp.com",
            projectId: "job-searching-tracker",
            storageBucket: "job-searching-tracker.firebasestorage.app",
            messagingSenderId: "41615562183",
            appId: "1:41615562183:web:654666dd152ed7455775e2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        window.db = db;

        signInAnonymously(auth).then(() => {
            onAuthStateChanged(auth, (user) => {
                if (user) startSync();
            });
        });

        function startSync() {
            // 注意：路徑設為 'jobs'，請確保 Firestore Rules 允許讀寫此集合
            const collRef = collection(db, 'jobs');
            onSnapshot(collRef, (snapshot) => {
                let jobs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                jobs.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                renderJobs(jobs);
                updateStats(jobs);
            }, (err) => {
                document.getElementById('list').innerHTML = `<div class="text-center text-red-400 p-10">資料庫讀取失敗！請確認 Firestore Rules 已設為 allow read, write: if true;</div>`;
            });
        }

        function renderJobs(jobs) {
            const container = document.getElementById('list');
            if (jobs.length === 0) {
                container.innerHTML = `<div class="bg-white p-16 rounded-[2.5rem] border-2 border-dashed border-slate-200 text-center text-slate-400 text-sm">目前沒有紀錄。</div>`;
                return;
            }
            container.innerHTML = '';
            jobs.forEach(job => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-3xl shadow-sm flex flex-col md:flex-row justify-between items-start md:items-center gap-4 transition-all hover:translate-y-[-2px]";
                div.innerHTML = `
                    <div class="flex-1">
                        <h3 class="font-bold text-slate-800 text-lg">${job.title || '職位'}</h3>
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-tight mt-1">${job.company || '公司'}</p>
                    </div>
                    <div class="flex items-center gap-4 w-full md:w-auto">
                        <select onchange="window.updateStatus('${job.id}', this.value)" class="status-pill ${getStatusClass(job.status)} flex-1 md:flex-none">
                            <option value="未投遞" ${job.status === '未投遞' ? 'selected' : ''}>未投遞</option>
                            <option value="已投遞" ${job.status === '已投遞' ? 'selected' : ''}>已投遞</option>
                            <option value="面試中" ${job.status === '面試中' ? 'selected' : ''}>面試中</option>
                            <option value="拒信" ${job.status === '拒信' ? 'selected' : ''}>拒信</option>
                            <option value="錄取" ${job.status === '錄取' ? 'selected' : ''}>錄取</option>
                        </select>
                        <button onclick="window.delJob('${job.id}')" class="text-slate-200 hover:text-red-400 p-1 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        window.updateStatus = async (id, status) => {
            await updateDoc(doc(db, 'jobs', id), { status });
        };

        window.delJob = async (id) => {
            if (confirm("確定要刪除這筆資料嗎？")) await deleteDoc(doc(db, 'jobs', id));
        };

        window.addNewJob = async () => {
            const title = prompt("輸入職稱 (例如: Marketing Intern):");
            const company = prompt("輸入公司名稱:");
            if (title && company) {
                await addDoc(collection(db, 'jobs'), { title, company, status: '未投遞', createdAt: serverTimestamp() });
            }
        };

        function getStatusClass(s) {
            if (s === '已投遞') return 'status-applied';
            if (s === '面試中') return 'status-interview';
            if (s === '拒信') return 'status-rejected';
            if (s === '錄取') return 'status-offer';
            return 'status-not-applied';
        }

        function updateStats(jobs) {
            document.getElementById('stat-total').innerText = jobs.length;
            document.getElementById('stat-interview').innerText = jobs.filter(j => j.status === '面試中').length;
            const offers = jobs.filter(j => j.status === '錄取').length;
            document.getElementById('stat-offers').innerText = offers;
            const rate = jobs.length ? Math.round((offers / jobs.length) * 100) : 0;
            document.getElementById('stat-rate').innerText = rate + "%";
        }
    </script>
</body>
</html>
