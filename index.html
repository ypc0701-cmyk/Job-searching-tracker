<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Hub | Chloe's Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfdfe; color: #1e293b; }
        .ai-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(241, 245, 249, 1); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #6366f1; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen pb-20">
    <div class="max-w-6xl mx-auto px-6 py-12">
        <div class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight text-slate-900">Career <span class="text-indigo-600">Hub</span></h1>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] mt-2">Chloe's Strategic Job Tracker</p>
            </div>
            <div class="flex gap-3">
                <button onclick="toggleAIPanel()" class="bg-white border border-slate-200 text-slate-600 px-6 py-3 rounded-2xl text-sm font-bold hover:bg-slate-50 transition-all flex items-center gap-2">✨ AI 分析 JD</button>
                <button onclick="openModal()" class="ai-gradient text-white px-8 py-3 rounded-2xl text-sm font-bold shadow-lg shadow-indigo-200 hover:opacity-90 transition-all">＋ 新增職位</button>
            </div>
        </div>

        <!-- AI 分析面板 -->
        <div id="ai-panel" class="hidden mb-12 glass p-8 rounded-[2.5rem] shadow-sm border-2 border-indigo-50">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">🤖 Gemini 智慧分析</h2>
                <span class="text-xs bg-indigo-50 text-indigo-500 px-3 py-1 rounded-full font-bold">Model: Gemini 2.5 Flash</span>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <textarea id="jd-input" rows="8" class="w-full p-4 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-indigo-500 bg-slate-50/50 text-sm" placeholder="請在此貼上職缺描述 (Job Description)..."></textarea>
                    <button onclick="analyzeJD()" id="analyze-btn" class="w-full mt-3 bg-slate-900 text-white py-3 rounded-xl font-bold text-sm">開始 AI 深度分析</button>
                </div>
                <div id="ai-result" class="bg-white p-6 rounded-2xl border border-dashed border-slate-200 flex flex-col items-center justify-center min-h-[200px] overflow-y-auto max-h-[400px]">
                    <p class="text-slate-400 text-sm italic">分析結果將顯示適配度與結構化欄位建議</p>
                </div>
            </div>
        </div>

        <!-- 數據統計 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12" id="stats-container">
            <div class="glass p-8 rounded-[2rem] text-center shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">已投遞 / 總數</p>
                <div class="text-4xl font-black" id="stat-ratio">0 / 0</div>
            </div>
            <div class="glass p-8 rounded-[2rem] text-center shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">面試中</p>
                <div class="text-4xl font-black text-amber-500" id="stat-interview">0</div>
            </div>
            <div class="glass p-8 rounded-[2rem] text-center shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">勝率</p>
                <div class="text-4xl font-black text-indigo-600" id="stat-winrate">0%</div>
            </div>
            <div class="glass p-8 rounded-[2rem] text-center shadow-sm border-b-4 border-green-500">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Offers</p>
                <div class="text-4xl font-black text-green-600" id="stat-offers">0</div>
            </div>
        </div>

        <!-- 職位列表 -->
        <div id="job-list" class="space-y-4">
            <div class="flex flex-col items-center justify-center py-20 text-slate-400">
                <div class="loader mb-4"></div>
                <p class="text-sm">同步雲端資料庫中...</p>
            </div>
        </div>
    </div>

    <!-- 表單 Modal -->
    <div id="modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-2xl shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modal-title" class="text-2xl font-extrabold text-slate-800">職位資訊</h2>
                <button onclick="closeModal()" class="text-slate-300 hover:text-slate-500">✕</button>
            </div>

            <!-- 自由填寫/掃描區 -->
            <div class="mb-6 p-4 bg-indigo-50/50 rounded-2xl border border-indigo-100">
                <label class="text-[10px] font-bold text-indigo-400 uppercase ml-1 flex justify-between">
                    <span>自動掃描區 (貼上列點資訊自動填充)</span>
                    <span class="text-indigo-300">支援 AI 分析產出的格式</span>
                </label>
                <textarea id="auto-scan-input" rows="2" oninput="autoFillFromText()" class="w-full bg-transparent outline-none text-sm mt-2 placeholder-indigo-300" placeholder="例如：職稱: Data Analyst, 公司: Google..."></textarea>
            </div>

            <div class="space-y-5">
                <input type="hidden" id="in-id">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">職缺名稱</label>
                        <input id="in-title" type="text" class="w-full px-4 py-3 bg-slate-50 rounded-xl outline-none border border-transparent focus:border-indigo-200 mt-1 text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">公司名稱</label>
                        <input id="in-company" type="text" class="w-full px-4 py-3 bg-slate-50 rounded-xl outline-none border border-transparent focus:border-indigo-200 mt-1 text-sm">
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">類別</label>
                        <select id="in-type" class="w-full px-4 py-3 bg-slate-50 rounded-xl mt-1 text-sm outline-none border border-transparent">
                            <option value="Intern">Intern</option>
                            <option value="Full-time">Full-time</option>
                            <option value="Contract">Contract</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">工作型態</label>
                        <select id="in-mode" class="w-full px-4 py-3 bg-slate-50 rounded-xl mt-1 text-sm outline-none border border-transparent">
                            <option value="On-site">On-site</option>
                            <option value="Remote">Remote</option>
                            <option value="Hybrid">Hybrid</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">狀態</label>
                        <select id="in-status" class="w-full px-4 py-3 bg-slate-50 rounded-xl mt-1 text-sm outline-none border border-transparent">
                            <option value="未投遞">未投遞</option>
                            <option value="已投遞">已投遞</option>
                            <option value="收到面試邀請">收到面試邀請</option>
                            <option value="錄取">錄取</option>
                            <option value="拒信">拒信</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">薪資</label>
                        <input id="in-salary" type="text" class="w-full px-4 py-3 bg-slate-50 rounded-xl outline-none border border-transparent focus:border-indigo-200 mt-1 text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">AI 評分</label>
                        <input id="in-score" type="number" step="0.1" class="w-full px-4 py-3 bg-slate-50 rounded-xl outline-none border border-transparent focus:border-indigo-200 mt-1 text-sm">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">職缺 URL</label>
                    <input id="in-url" type="url" class="w-full px-4 py-3 bg-slate-50 rounded-xl outline-none border border-transparent focus:border-indigo-200 mt-1 text-sm" placeholder="https://...">
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Network URL (LinkedIn/Referral)</label>
                    <input id="in-network" type="url" class="w-full px-4 py-3 bg-slate-50 rounded-xl outline-none border border-transparent focus:border-indigo-200 mt-1 text-sm" placeholder="https://...">
                </div>
            </div>

            <div class="flex gap-4 mt-10">
                <button id="btn-delete" onclick="handleDelete()" class="hidden flex-none px-6 py-4 font-bold text-red-400 hover:text-red-600 text-sm">刪除紀錄</button>
                <button onclick="submitJob()" id="btn-submit" class="flex-1 ai-gradient text-white py-4 rounded-2xl font-bold shadow-lg text-sm">儲存資訊</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'chloe-job-hub-v4';
        const apiKey = ""; 

        let currentUser = null;
        let allJobs = [];

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token).catch(() => signInAnonymously(auth));
            } else {
                await signInAnonymously(auth);
            }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                const userJobsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'jobs');
                onSnapshot(userJobsRef, (snap) => {
                    allJobs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    allJobs.sort((a, b) => (b.updatedAt?.seconds || 0) - (a.updatedAt?.seconds || 0));
                    renderJobs();
                    updateStats();
                }, (err) => console.error("Firestore Error:", err));
            }
        });

        // --- AI 分析與自動生成 ---
        window.analyzeJD = async () => {
            const jd = document.getElementById('jd-input').value;
            if (!jd.trim()) return;

            const btn = document.getElementById('analyze-btn');
            const resultDiv = document.getElementById('ai-result');
            btn.innerText = "🔍 Gemini 正在研讀內容...";
            btn.disabled = true;

            const systemPrompt = `你是一位專業的職涯顧問。請分析這篇 JD 並給出評分（針對 Chloe: Python/SQL/MSBA 背景）。
            若分數 > 6，請額外提供結構化的「列點資訊」以便直接複製使用。
            請以 JSON 格式回傳：
            {
                "score": 數字,
                "title": "職稱",
                "company": "公司",
                "type": "Intern/Full-time",
                "mode": "On-site/Remote/Hybrid",
                "salary": "估計值",
                "reason": "適配原因",
                "bulletPoints": "職稱: ...\\n公司: ...\\n類別: ...\\n型態: ...\\n薪資: ..."
            }`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `請分析此 JD：${jd}` }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                const result = await response.json();
                const aiData = JSON.parse(result.candidates[0].content.parts[0].text);
                
                let html = `
                    <div class="text-left w-full space-y-4">
                        <div class="flex justify-between items-center">
                            <span class="text-3xl font-black ${aiData.score > 6 ? 'text-indigo-600' : 'text-slate-400'}">得分: ${aiData.score}</span>
                            <span class="text-[10px] font-bold bg-indigo-50 text-indigo-500 px-2 py-1 rounded-lg">分析完成</span>
                        </div>
                        <div class="p-4 bg-slate-50 rounded-xl border border-slate-100">
                            <p class="text-xs font-bold text-slate-700">🎯 ${aiData.title} @ ${aiData.company}</p>
                            <p class="text-[11px] text-slate-500 mt-1 leading-relaxed">${aiData.reason}</p>
                        </div>
                `;

                if (aiData.score > 6) {
                    html += `
                        <div class="space-y-2">
                            <p class="text-[10px] font-black text-indigo-400 uppercase tracking-widest">自動生成的列點資訊：</p>
                            <pre class="text-[11px] bg-indigo-50 p-3 rounded-xl text-indigo-700 whitespace-pre-wrap font-mono">${aiData.bulletPoints}</pre>
                        </div>
                        <button onclick='quickFillAI(${JSON.stringify(aiData).replace(/'/g, "&apos;")})' class="w-full py-3 ai-gradient text-white rounded-xl text-xs font-bold shadow-lg">直接帶入表單</button>
                    `;
                } else {
                    html += `<p class="text-[11px] text-amber-500 italic">註：評分未達 6 分，建議再斟酌是否投遞。</p>`;
                }
                
                html += `</div>`;
                resultDiv.innerHTML = html;
            } catch (err) {
                resultDiv.innerHTML = `<p class="text-red-500 text-xs">分析發生錯誤，請重試。</p>`;
            } finally {
                btn.innerText = "開始 AI 深度分析";
                btn.disabled = false;
            }
        };

        // 快速填入功能
        window.quickFillAI = (data) => {
            openModal();
            document.getElementById('in-title').value = data.title || "";
            document.getElementById('in-company').value = data.company || "";
            document.getElementById('in-type').value = data.type || "Intern";
            document.getElementById('in-mode').value = data.mode || "On-site";
            document.getElementById('in-salary').value = data.salary || "";
            document.getElementById('in-score').value = data.score || "";
        };

        // 自動掃描解析功能
        window.autoFillFromText = () => {
            const text = document.getElementById('auto-scan-input').value;
            const patterns = {
                title: /(?:職稱|Title)[:：]\s*(.*)/i,
                company: /(?:公司|Company)[:：]\s*(.*)/i,
                type: /(?:類別|類|Type)[:：]\s*(.*)/i,
                mode: /(?:型態|工作型態|Mode)[:：]\s*(.*)/i,
                salary: /(?:薪資|薪水|Salary)[:：]\s*(.*)/i,
                score: /(?:評分|得分|Score)[:：]\s*([\d.]+)/i
            };

            for (const [key, regex] of Object.entries(patterns)) {
                const match = text.match(regex);
                if (match && match[1]) {
                    const val = match[1].trim();
                    const el = document.getElementById(`in-${key}`);
                    if (el) {
                        if (el.tagName === "SELECT") {
                            // 模糊匹配 Select 選項
                            Array.from(el.options).forEach(opt => {
                                if (val.toLowerCase().includes(opt.value.toLowerCase())) el.value = opt.value;
                            });
                        } else {
                            el.value = val;
                        }
                    }
                }
            }
        };

        window.renderJobs = () => {
            const list = document.getElementById('job-list');
            if (allJobs.length === 0) {
                list.innerHTML = `<div class="text-center py-20 text-slate-300 text-sm italic">尚無資料，點擊「新增」開始追蹤。</div>`;
                return;
            }
            list.innerHTML = allJobs.map(job => `
                <div onclick="openEditModal('${job.id}')" class="bg-white p-6 rounded-[2rem] flex items-center justify-between cursor-pointer border border-transparent hover:border-slate-100 transition-all shadow-sm hover:shadow-md">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <h3 class="font-bold text-lg text-slate-800">${job.title}</h3>
                            <span class="text-[9px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded font-bold">${job.type || 'N/A'}</span>
                        </div>
                        <div class="flex items-center gap-3 text-slate-400">
                            <p class="font-bold text-xs uppercase tracking-wider">${job.company}</p>
                            <span class="text-[10px]">•</span>
                            <p class="text-[11px]">${job.mode || 'On-site'}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-6">
                        <div class="text-right hidden sm:block">
                            <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest">AI 評分</p>
                            <p class="font-black text-lg text-indigo-600">${job.score || '0.0'}</p>
                        </div>
                        <div class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase ${getStatusStyle(job.status)}">${job.status}</div>
                    </div>
                </div>
            `).join('');
        };

        function getStatusStyle(s) {
            const styles = {
                '已投遞': 'bg-blue-50 text-blue-600',
                '收到面試邀請': 'bg-amber-50 text-amber-600',
                '錄取': 'bg-green-50 text-green-600',
                '拒信': 'bg-red-50 text-red-600'
            };
            return styles[s] || 'bg-slate-50 text-slate-400';
        }

        window.submitJob = async () => {
            if (!currentUser) return;
            const id = document.getElementById('in-id').value;
            const data = {
                title: document.getElementById('in-title').value || "未命名職位",
                company: document.getElementById('in-company').value || "未知公司",
                type: document.getElementById('in-type').value,
                mode: document.getElementById('in-mode').value,
                status: document.getElementById('in-status').value,
                salary: document.getElementById('in-salary').value,
                score: document.getElementById('in-score').value,
                url: document.getElementById('in-url').value,
                network: document.getElementById('in-network').value,
                updatedAt: serverTimestamp()
            };
            const colRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'jobs');
            if (id) {
                await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'jobs', id), data);
            } else {
                await addDoc(colRef, { ...data, createdAt: serverTimestamp() });
            }
            closeModal();
        };

        window.handleDelete = async () => {
            if (confirm("確定要刪除這筆應徵紀錄嗎？")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'jobs', document.getElementById('in-id').value));
                closeModal();
            }
        };

        window.toggleAIPanel = () => document.getElementById('ai-panel').classList.toggle('hidden');
        window.closeModal = () => document.getElementById('modal').classList.replace('flex', 'hidden');
        
        window.openModal = () => {
            document.getElementById('modal-title').innerText = "新增職位追蹤";
            document.getElementById('in-id').value = "";
            document.querySelectorAll('#modal input, #modal textarea').forEach(el => el.value = "");
            document.getElementById('in-status').value = "未投遞";
            document.getElementById('in-type').value = "Intern";
            document.getElementById('btn-delete').classList.add('hidden');
            document.getElementById('modal').classList.replace('hidden', 'flex');
        };

        window.openEditModal = (id) => {
            const job = allJobs.find(j => j.id === id);
            if (!job) return;
            document.getElementById('modal-title').innerText = "編輯職位資訊";
            document.getElementById('in-id').value = id;
            document.getElementById('in-title').value = job.title || "";
            document.getElementById('in-company').value = job.company || "";
            document.getElementById('in-type').value = job.type || "Intern";
            document.getElementById('in-mode').value = job.mode || "On-site";
            document.getElementById('in-status').value = job.status || "未投遞";
            document.getElementById('in-salary').value = job.salary || "";
            document.getElementById('in-score').value = job.score || "";
            document.getElementById('in-url').value = job.url || "";
            document.getElementById('in-network').value = job.network || "";
            document.getElementById('btn-delete').classList.remove('hidden');
            document.getElementById('modal').classList.replace('hidden', 'flex');
        };

        function updateStats() {
            const total = allJobs.length;
            const applied = allJobs.filter(j => j.status !== '未投遞').length;
            const interview = allJobs.filter(j => j.status === '收到面試邀請').length;
            const offers = allJobs.filter(j => j.status === '錄取').length;
            document.getElementById('stat-ratio').innerText = `${applied} / ${total}`;
            document.getElementById('stat-interview').innerText = interview;
            document.getElementById('stat-offers').innerText = offers;
            document.getElementById('stat-winrate').innerText = applied ? Math.round((offers / applied) * 100) + "%" : "0%";
        }
    </script>
</body>
</html>
