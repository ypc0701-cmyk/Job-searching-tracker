<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Career Hub | Chloe's Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfdfe; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .ai-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(241, 245, 249, 1); }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #6366f1; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-badge { padding: 4px 12px; border-radius: 9999px; font-size: 10px; font-weight: 700; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- 安全配置遮罩 (保護 API Keys 不被 GitHub 洩漏) -->
    <div id="setup-overlay" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[100] flex items-center justify-center p-6 hidden">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-md w-full shadow-2xl">
            <h2 class="text-2xl font-bold text-slate-800 mb-2 text-center">安全存取設置 🔐</h2>
            <p class="text-slate-500 text-sm mb-8 text-center">GitHub 已設為 Public，請在此填入 API Keys。這僅會存在您的瀏覽器中，不會上傳至 GitHub。</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Gemini API Key</label>
                    <input id="setup-gemini" type="password" class="w-full px-4 py-3 bg-slate-50 rounded-xl mt-1 text-sm outline-none border border-slate-200" placeholder="AIzaSy...">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Firebase Config (JSON)</label>
                    <textarea id="setup-fb-config" rows="5" class="w-full px-4 py-3 bg-slate-50 rounded-xl mt-1 text-[10px] font-mono outline-none border border-slate-200" placeholder='{ "apiKey": "...", "projectId": "...", ... }'></textarea>
                </div>
            </div>
            
            <button onclick="saveSetup()" class="w-full mt-8 ai-gradient text-white py-4 rounded-2xl font-bold shadow-lg hover:opacity-90 transition-all">確認並儲存於本機</button>
            <p class="text-center mt-4 text-[10px] text-slate-400">數據將自動與您的 Firebase 雲端同步</p>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-6 py-12">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight text-slate-900">Career <span class="text-indigo-600">Hub</span></h1>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] mt-2">Hi Chloe! Your Strategic AI Tracker</p>
            </div>
            <div class="flex gap-3 w-full md:w-auto">
                <div id="conn-status" class="flex items-center gap-2 px-3 py-2 bg-slate-100 rounded-full text-[10px] font-bold text-slate-400">
                    <span class="w-2 h-2 rounded-full bg-slate-300"></span> 離線狀態
                </div>
                <button onclick="toggleAIPanel()" class="flex-1 md:flex-none bg-white border border-slate-200 text-slate-600 px-6 py-3 rounded-2xl text-sm font-bold hover:bg-slate-50 transition-all flex items-center justify-center gap-2">✨ AI 分析</button>
                <button onclick="openModal()" class="flex-1 md:flex-none ai-gradient text-white px-8 py-3 rounded-2xl text-sm font-bold shadow-lg shadow-indigo-100 hover:opacity-90 transition-all">＋ 新增</button>
                <button onclick="showSetup()" class="p-3 bg-slate-100 rounded-2xl text-slate-400 hover:text-slate-600 transition-colors">⚙️</button>
            </div>
        </div>

        <!-- AI 分析面板 -->
        <div id="ai-panel" class="hidden mb-12 glass p-8 rounded-[2.5rem] shadow-sm border-2 border-indigo-50">
            <h2 class="text-xl font-bold mb-4 text-slate-800">🤖 Gemini 智慧分析</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">貼上 Job Description</label>
                    <textarea id="jd-input" rows="8" class="w-full p-4 rounded-2xl border border-slate-100 outline-none focus:ring-2 focus:ring-indigo-500 bg-slate-50/50 text-sm" placeholder="在此處貼上 JD 內容..."></textarea>
                    <button onclick="analyzeJD()" id="analyze-btn" class="w-full mt-3 bg-slate-900 text-white py-3 rounded-xl font-bold text-sm hover:bg-slate-800 transition-all">啟動 AI 深度評估</button>
                </div>
                <div id="ai-result" class="bg-white p-6 rounded-2xl border border-dashed border-slate-200 min-h-[250px] flex flex-col justify-center">
                    <p class="text-sm italic text-slate-400 text-center">等待 JD 輸入中...</p>
                </div>
            </div>
        </div>

        <!-- 統計數據 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12">
            <div class="glass p-8 rounded-[2rem] text-center shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">已投遞 / 總數</p>
                <div class="text-3xl font-black" id="stat-ratio">0 / 0</div>
            </div>
            <div class="glass p-8 rounded-[2rem] text-center shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">面試邀請</p>
                <div class="text-3xl font-black text-amber-500" id="stat-interview">0</div>
            </div>
            <div class="glass p-8 rounded-[2rem] text-center shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">適配度 (Avg)</p>
                <div class="text-3xl font-black text-indigo-600" id="stat-avg-score">0.0</div>
            </div>
            <div class="glass p-8 rounded-[2rem] text-center shadow-sm border-2 border-green-100">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Offers</p>
                <div class="text-3xl font-black text-green-600" id="stat-offers">0</div>
            </div>
        </div>

        <!-- 職位列表 -->
        <div id="job-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 動態加載 -->
        </div>
    </div>

    <!-- 表單 Modal -->
    <div id="modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-lg shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modal-title" class="text-2xl font-extrabold text-slate-800">職位詳情</h2>
                <button onclick="closeModal()" class="text-slate-300 hover:text-slate-500 text-xl">✕</button>
            </div>
            <div class="space-y-5">
                <input type="hidden" id="in-id">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">基本資訊</label>
                    <div class="grid grid-cols-1 gap-3">
                        <input id="in-title" placeholder="職稱 (e.g. Product Ops Intern)" class="w-full px-4 py-3 bg-slate-50 rounded-xl text-sm outline-none border border-transparent focus:border-indigo-100">
                        <input id="in-company" placeholder="公司名稱" class="w-full px-4 py-3 bg-slate-50 rounded-xl text-sm outline-none border border-transparent focus:border-indigo-100">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">當前狀態</label>
                        <select id="in-status" class="w-full px-4 py-3 bg-slate-50 rounded-xl text-sm outline-none">
                            <option value="未投遞">未投遞</option>
                            <option value="已投遞">已投遞</option>
                            <option value="面試中">面試中</option>
                            <option value="錄取">錄取</option>
                            <option value="拒信">拒信</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">適配得分</label>
                        <input id="in-score" type="number" step="0.1" placeholder="AI Score" class="w-full px-4 py-3 bg-slate-50 rounded-xl text-sm outline-none border border-transparent focus:border-indigo-100">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">備註</label>
                    <textarea id="in-notes" rows="4" placeholder="連結、薪資資訊或進度備註..." class="w-full px-4 py-3 bg-slate-50 rounded-xl text-sm outline-none"></textarea>
                </div>
            </div>
            <div class="flex gap-4 mt-10">
                <button id="btn-delete" onclick="deleteJob()" class="hidden px-4 py-4 font-bold text-red-400 text-sm hover:text-red-600 transition-colors">刪除</button>
                <button onclick="saveJob()" class="flex-1 ai-gradient text-white py-4 rounded-2xl font-bold shadow-lg text-sm hover:opacity-90 transition-all">儲存職位</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        let db, auth, geminiKey, allJobs = [];
        const APP_ID = "chloe-career-v3";

        // ==========================================
        // 初始化與安全機制
        // ==========================================
        window.onload = () => {
            const savedFB = localStorage.getItem('chloe_fb_config');
            const savedGemini = localStorage.getItem('chloe_gemini_key');
            
            if (!savedFB || !savedGemini) {
                document.getElementById('setup-overlay').classList.remove('hidden');
            } else {
                try {
                    startApp(JSON.parse(savedFB), savedGemini);
                } catch (e) {
                    localStorage.clear();
                    location.reload();
                }
            }
        };

        window.saveSetup = () => {
            const fbConfig = document.getElementById('setup-fb-config').value.trim();
            const gemini = document.getElementById('setup-gemini').value.trim();
            if(!fbConfig || !gemini) return alert("請填寫完整資訊");
            try {
                JSON.parse(fbConfig);
                localStorage.setItem('chloe_fb_config', fbConfig);
                localStorage.setItem('chloe_gemini_key', gemini);
                location.reload();
            } catch (e) {
                alert("Firebase Config 格式錯誤");
            }
        };

        window.showSetup = () => document.getElementById('setup-overlay').classList.remove('hidden');

        async function startApp(config, gKey) {
            const statusEl = document.getElementById('conn-status');
            geminiKey = gKey;
            try {
                const app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);
                await signInAnonymously(auth);

                statusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-green-500"></span> 雲端已連線`;
                statusEl.classList.replace('text-slate-400', 'text-green-600');

                // 使用路徑規範: /artifacts/{appId}/users/{userId}/jobs
                const userId = auth.currentUser.uid;
                const jobsCol = collection(db, 'artifacts', APP_ID, 'users', userId, 'jobs');

                onSnapshot(jobsCol, (snap) => {
                    allJobs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    render();
                }, (err) => console.error("Firestore Listen Error:", err));
            } catch (err) {
                statusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-500"></span> 連線錯誤`;
            }
        }

        // ==========================================
        // AI 分析功能
        // ==========================================
        window.analyzeJD = async () => {
            const jd = document.getElementById('jd-input').value;
            if (!jd) return alert("請輸入 JD");
            const btn = document.getElementById('analyze-btn');
            const resultArea = document.getElementById('ai-result');
            
            btn.disabled = true;
            resultArea.innerHTML = `<div class="flex flex-col items-center py-10"><div class="loader mb-3"></div><p class="text-xs text-indigo-500 font-bold uppercase tracking-widest">Gemini 正在精算...</p></div>`;

            const prompt = `你是頂級求職顧問。根據 JD: "${jd}"，對比 Chloe (MSBA @ BU, Garmin Intern, Founder of Pour.selection)。
            請嚴格以 JSON 格式回傳: {"score":數字, "title":"職稱", "company":"公司", "reason":"50字內原因", "suggest":"建議點"}。不回傳任何 Markdown 標籤。`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                const ai = JSON.parse(data.candidates[0].content.parts[0].text.trim().replace(/```json|```/g, ""));

                resultArea.innerHTML = `
                    <div class="space-y-4 text-left">
                        <div class="flex justify-between items-start">
                            <h3 class="font-bold text-slate-800 text-lg">${ai.company}</h3>
                            <span class="text-3xl font-black text-indigo-600">${ai.score}<span class="text-[10px] text-slate-300">/10</span></span>
                        </div>
                        <p class="text-sm font-bold text-indigo-400 -mt-2">${ai.title}</p>
                        <p class="text-xs text-slate-500 leading-relaxed">${ai.reason}</p>
                        <div class="p-4 bg-indigo-50 rounded-2xl text-[10px] font-bold text-indigo-600 leading-tight">💡 建議：${ai.suggest}</div>
                        <button onclick='quickFill(${JSON.stringify(ai).replace(/'/g, "&apos;")})' class="w-full py-3 ai-gradient text-white rounded-xl text-xs font-bold shadow-md">快速匯入追蹤表</button>
                    </div>`;
            } catch (e) {
                resultArea.innerHTML = `<p class="text-xs text-red-400 text-center">分析失敗，請檢查 Key 或內容。</p>`;
            } finally {
                btn.disabled = false;
            }
        };

        window.quickFill = (ai) => {
            openModal();
            document.getElementById('in-title').value = ai.title;
            document.getElementById('in-company').value = ai.company;
            document.getElementById('in-score').value = ai.score;
        };

        // ==========================================
        // 渲染與統計
        // ==========================================
        function render() {
            const list = document.getElementById('job-list');
            if (allJobs.length === 0) {
                list.innerHTML = `<div class="col-span-full text-center py-20 text-slate-300 italic">尚未有追蹤職位，使用 AI 立即分析！</div>`;
                return;
            }
            allJobs.sort((a,b) => (b.updatedAt?.seconds || 0) - (a.updatedAt?.seconds || 0));
            list.innerHTML = allJobs.map(j => `
                <div onclick="openEdit('${j.id}')" class="bg-white p-6 rounded-[2.2rem] shadow-sm hover:shadow-md transition-all border border-slate-50 hover:border-indigo-100 cursor-pointer group">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-3 bg-indigo-50 rounded-2xl group-hover:bg-indigo-600 group-hover:text-white transition-colors">
                            <span class="text-xl">💼</span>
                        </div>
                        <div class="text-right">
                            <div class="text-lg font-black text-slate-800">${j.score || 0}<span class="text-[10px] text-slate-300 font-normal"> pts</span></div>
                        </div>
                    </div>
                    <h3 class="font-bold text-slate-800 leading-tight mb-1 truncate">${j.title}</h3>
                    <p class="text-xs text-slate-400 mb-4">${j.company}</p>
                    <div class="${getStatusStyle(j.status)} status-badge inline-block">${j.status}</div>
                </div>
            `).join('');
            updateStats();
        }

        function getStatusStyle(s) {
            const styles = {
                '錄取': 'bg-green-50 text-green-600',
                '面試中': 'bg-amber-50 text-amber-600',
                '拒信': 'bg-red-50 text-red-600',
                '已投遞': 'bg-blue-50 text-blue-600',
                '未投遞': 'bg-slate-50 text-slate-400'
            };
            return styles[s] || styles['未投遞'];
        }

        function updateStats() {
            const applied = allJobs.filter(j => j.status !== '未投遞').length;
            const interview = allJobs.filter(j => j.status === '面試中').length;
            const offer = allJobs.filter(j => j.status === '錄取').length;
            const avg = allJobs.length ? (allJobs.reduce((acc, j) => acc + (parseFloat(j.score)||0), 0) / allJobs.length).toFixed(1) : 0;
            
            document.getElementById('stat-ratio').innerText = `${applied} / ${allJobs.length}`;
            document.getElementById('stat-interview').innerText = interview;
            document.getElementById('stat-offers').innerText = offer;
            document.getElementById('stat-avg-score').innerText = avg;
        }

        // ==========================================
        // Firestore 操作
        // ==========================================
        window.saveJob = async () => {
            if (!auth.currentUser) return;
            const id = document.getElementById('in-id').value;
            const data = {
                title: document.getElementById('in-title').value,
                company: document.getElementById('in-company').value,
                status: document.getElementById('in-status').value,
                score: parseFloat(document.getElementById('in-score').value) || 0,
                notes: document.getElementById('in-notes').value,
                updatedAt: serverTimestamp(),
                createdAt: serverTimestamp()
            };
            
            const colRef = collection(db, 'artifacts', APP_ID, 'users', auth.currentUser.uid, 'jobs');
            try {
                if(id) {
                    delete data.createdAt;
                    await updateDoc(doc(db, 'artifacts', APP_ID, 'users', auth.currentUser.uid, 'jobs', id), data);
                } else {
                    await addDoc(colRef, data);
                }
                closeModal();
            } catch (e) { alert("儲存失敗"); }
        };

        window.deleteJob = async () => {
            if(confirm("確定刪除？")) {
                await deleteDoc(doc(db, 'artifacts', APP_ID, 'users', auth.currentUser.uid, 'jobs', document.getElementById('in-id').value));
                closeModal();
            }
        };

        // UI Helpers
        window.openModal = () => {
            document.getElementById('modal-title').innerText = "新增職位";
            document.getElementById('in-id').value = "";
            document.querySelectorAll('#modal input, #modal textarea').forEach(i => i.value = "");
            document.getElementById('btn-delete').classList.add('hidden');
            document.getElementById('modal').classList.replace('hidden', 'flex');
        };

        window.openEdit = (id) => {
            const j = allJobs.find(x => x.id === id);
            document.getElementById('modal-title').innerText = "編輯紀錄";
            document.getElementById('in-id').value = id;
            document.getElementById('in-title').value = j.title || "";
            document.getElementById('in-company').value = j.company || "";
            document.getElementById('in-status').value = j.status || "未投遞";
            document.getElementById('in-score').value = j.score || 0;
            document.getElementById('in-notes').value = j.notes || "";
            document.getElementById('btn-delete').classList.remove('hidden');
            document.getElementById('modal').classList.replace('hidden', 'flex');
        };

        window.closeModal = () => document.getElementById('modal').classList.replace('flex', 'hidden');
        window.toggleAIPanel = () => document.getElementById('ai-panel').classList.toggle('hidden');
    </script>
</body>
</html>
